<title>오늘 뭐 먹지?</title>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=2a202fc6da16c2ff08cc316ddd1ed0d5&libraries=services&autoload=false"></script>
<style>
:root{
  --bg:#07070e;--surface:#0d0d18;--card:#111120;--card2:#181828;
  --gold:#c9a84c;--gold2:#e8c96a;--gold-glow:rgba(201,168,76,.15);
  --green:#03c75a;--text:#ede9e1;--muted:#5a5870;--border:rgba(255,255,255,.06);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Background */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-orb{position:absolute;border-radius:50%;filter:blur(100px)}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(20,8,40,.8),transparent 70%);top:-150px;right:-150px;animation:orb1 14s ease-in-out infinite}
.bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(5,20,15,.8),transparent 70%);bottom:-100px;left:-100px;animation:orb2 18s ease-in-out infinite}
.bg-orb-3{width:350px;height:350px;background:radial-gradient(circle,rgba(201,168,76,.04),transparent 70%);top:35%;left:20%;animation:orb3 11s ease-in-out infinite}
.bg-line{position:fixed;top:0;left:50%;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(201,168,76,.06) 30%,rgba(201,168,76,.06) 70%,transparent);transform:translateX(-50%);pointer-events:none;z-index:0}

.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:2}
.container{width:100%;max-width:400px}

/* Progress */
.progress-wrap{margin-bottom:36px}
.progress-track{height:1px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .6s cubic-bezier(.4,0,.2,1)}
.progress-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

/* Buttons */
.btn-primary{width:100%;padding:16px 24px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);color:#080600;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:.04em;transition:all .3s ease;position:relative;overflow:hidden}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(201,168,76,.25)}
.btn-ghost{width:100%;padding:14px 24px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;font-weight:400;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .25s ease}
.btn-ghost:hover{border-color:rgba(255,255,255,.15);color:var(--text)}

/* Options */
.options-list{display:flex;flex-direction:column;gap:8px}
.option-btn{width:100%;padding:15px 18px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:400;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .22s ease;text-align:left;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.option-btn .opt-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .22s ease}
.option-btn:hover{border-color:rgba(201,168,76,.25);background:var(--card2);transform:translateX(3px)}
.option-btn:hover .opt-dot{background:var(--gold)}
.option-btn.selected{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.07)}
.option-btn.selected .opt-dot{background:var(--gold);box-shadow:0 0 8px rgba(201,168,76,.6)}

/* Rank Cards — full image style */
.rank-cards{display:flex;flex-direction:column;gap:14px;margin:24px 0}
.rank-card{border-radius:var(--radius);border:1px solid var(--border);background:var(--card);overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative}
.rank-card:hover{transform:translateY(-4px);box-shadow:0 24px 64px rgba(0,0,0,.6),0 0 0 1px rgba(201,168,76,.2)}
.rank-card-cover{position:relative;height:170px;overflow:hidden}
.rank-card-cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.rank-card:hover .rank-card-cover img{transform:scale(1.04)}
.rank-card-cover-placeholder{width:100%;height:170px;background:linear-gradient(135deg,var(--card2),var(--card));display:flex;align-items:center;justify-content:center;font-size:56px}
.rank-card-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1) 0%,rgba(7,7,14,.85) 100%)}
.rank-card-badge{position:absolute;top:14px;left:14px;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.rank-card.rank-1 .rank-card-badge{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#060400}
.rank-card.rank-2 .rank-card-badge{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);backdrop-filter:blur(8px)}
.rank-card.rank-3 .rank-card-badge{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);backdrop-filter:blur(8px)}
.rank-card-title{position:absolute;bottom:14px;left:16px;right:16px}
.rank-card-name{font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:-.01em;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.rank-card-body{padding:14px 16px}
.rank-card-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.rank-card-footer{display:flex;align-items:center;justify-content:space-between}
.rank-card-price{font-size:12px;color:var(--gold);font-weight:600;letter-spacing:.02em}
.rank-card-cta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;transition:all .2s}
.rank-card:hover .rank-card-cta{color:var(--gold)}

/* Tabs */
.tab-row{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{flex:1;padding:10px 4px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;text-align:center;line-height:1.6;letter-spacing:.02em}
.tab-btn.active{border-color:rgba(201,168,76,.35);background:var(--gold-glow);color:var(--gold)}

/* Map */
.kakao-map-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);position:relative;background:var(--card);margin-bottom:12px;height:280px}
.kakao-map-wrap::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);z-index:10;pointer-events:none}
#kakao-map{width:100%;height:100%}
.map-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card);z-index:5;gap:14px;pointer-events:none}
.map-loading-ring{width:32px;height:32px;border:1.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}
.map-loading-text{font-size:11px;color:var(--muted);letter-spacing:.06em}

/* Restaurant Cards */
.restaurant-list{display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto;padding-right:2px}
.restaurant-list::-webkit-scrollbar{width:2px}
.restaurant-list::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:2px}
.rest-card{border-radius:14px;border:1px solid rgba(255,255,255,.12);background:#2a2a3e;display:flex;cursor:pointer;transition:all .2s ease;min-height:80px}
.rest-card:hover{border-color:rgba(201,168,76,.3);background:#32324a;transform:translateX(2px)}
.naver-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 16px;background:var(--green);color:#fff;text-decoration:none;font-size:9px;font-weight:700;flex-shrink:0;transition:background .2s;font-family:'Noto Sans KR',sans-serif;border:none;cursor:pointer;letter-spacing:.03em;border-radius:0 14px 14px 0}
.naver-btn:hover{background:#029e4e}
.naver-btn-n{font-size:18px;font-weight:900;line-height:1;font-family:serif}

/* Infowindow */
.kakao-iw{background:#0d0d18;border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;box-shadow:0 12px 40px rgba(0,0,0,.9);min-width:160px;border:1px solid rgba(201,168,76,.15);position:relative}
.kakao-iw::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:#0d0d18;border-bottom:none}
.kakao-iw .iw-name{font-weight:700;font-size:13px;margin-bottom:5px}
.kakao-iw .iw-row{font-size:11px;color:var(--muted);margin-top:2px}
.kakao-iw .iw-dist{color:var(--gold);font-size:11px;font-weight:600;margin-bottom:2px}

/* Animations */
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,30px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-25px)}}
@keyframes orb3{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,35px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleUp{from{opacity:0;transform:scale(.97) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.anim-scaleUp{animation:scaleUp .5s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.anim-fadeUp{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.anim-slideUp{animation:slideUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
</style>
</head>

function getTop3(answers){
  const a={};answers.forEach(x=>a[x.questionId]=x.value);
  const all=Object.keys(FOOD_DB);
  function score(key){
    const f=FOOD_DB[key];let s=0;
    // Cuisine
    if(a.cuisine==="korean"&&f.cuisine==="korean")s+=10;
    else if(a.cuisine==="asian"&&["japanese","chinese","vietnamese","thai"].includes(f.cuisine))s+=10;
    else if(a.cuisine==="western"&&["western","italian","cafe"].includes(f.cuisine))s+=10;
    else if(a.cuisine==="any_cuisine")s+=3;
    else s-=4;
    // Mood
    const spicyF=["kimchi_jjigae","budae","dakgalbi","tteokbokki","fire_chicken","malatang","jjambbong","tom_yum"];
    const warmF=["sundubu","doenjang","gamjatang","galbitang","samgyetang","seolleongtang","kalguksu","gukbap","udon","ramen","pho","jjajang","curry_jp","budae"];
    const lightF=["salad","cafe","bakery","bingsu","kimbap","banh_mi","brunch","naengmyeon"];
    const specialF=["steak","sushi","sashimi","korean_bbq","risotto","bbq_ribs","dimsum","jokbal"];
    if(a.mood==="spicy"){if(spicyF.includes(key))s+=8;else if(lightF.includes(key))s-=3}
    if(a.mood==="warm"){if(warmF.includes(key))s+=7;else if(lightF.includes(key))s-=2}
    if(a.mood==="light"){if(lightF.includes(key))s+=8;else if(spicyF.includes(key))s-=4}
    if(a.mood==="special"){if(specialF.includes(key))s+=8;else s-=1}
    // Meal
    if(a.meal==="breakfast"){if(["brunch","cafe","bakery","salad"].includes(key))s+=7}
    if(a.meal==="snack"){if(["tteokbokki","kimbap","bingsu","bakery","chicken"].includes(key))s+=7}
    if(a.meal==="dinner"){if(["steak","korean_bbq","samgyeopsal","sushi","sashimi","bossam","bbq_ribs","jokbal"].includes(key))s+=4}
    // Company
    if(a.company==="solo"){if(["ramen","udon","kalguksu","gukbap","jjajang","jjambbong","curry_jp","kimbap","bibimbap","katsu"].includes(key))s+=5}
    if(a.company==="couple"){if(["steak","sushi","pasta","risotto","brunch","pizza","samgyeopsal"].includes(key))s+=4}
    if(a.company==="large"){if(["korean_bbq","samgyeopsal","dakgalbi","malatang","yanggochi","chicken","budae","bossam"].includes(key))s+=5}
    // Budget
    const p=f.price||10000;
    if(a.budget==="cheap"){if(p<=8000)s+=9;else if(p<=12000)s+=3;else s-=5}
    if(a.budget==="mid"){if(p>8000&&p<=18000)s+=7;else if(p<=8000)s+=3;else s-=3}
    if(a.budget==="expensive"){if(p>15000&&p<=35000)s+=7;else if(p<=15000)s-=2}
    if(a.budget==="flex"){if(p>=30000)s+=9;else if(p>=20000)s+=5;else s-=3}
    s+=Math.random()*2.5;
    return s;
  }
  const scored=all.map(k=>({key:k,score:score(k),cuisine:FOOD_DB[k].cuisine})).sort((a,b)=>b.score-a.score);
  const result=[scored[0]];
  for(let i=1;i<scored.length&&result.length<3;i++){
    if(result.every(r=>r.cuisine!==scored[i].cuisine)||result.length===2)result.push(scored[i]);
  }
  return result.map(r=>({...FOOD_DB[r.key],key:r.key}));
}

function getDistance(la1,lo1,la2,lo2){const R=6371000,r=Math.PI/180,dL=(la2-la1)*r,dG=(lo2-lo1)*r;const a=Math.sin(dL/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function formatDist(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km'}

async function searchNearby(lat, lng, rec){
  const radius = 1500;
  const strictKw = (FOOD_MENU[rec.key] || {}).strict || rec.search || [];

  const seen = new Set();
  let allResults = [];

  for(const kw of strictKw.slice(0, 5)){
    try{
      const qs = new URLSearchParams({
        query: kw,       // 키워드만으로 검색 — 카카오가 알아서 관련 음식점 반환
        x: lng,
        y: lat,
        radius: radius,
        size: 15,
        category_group_code: "FD6"  // 음식점 카테고리만
      });
      const res = await fetch(`/api/kakao/search?${qs}`);
      const data = await res.json();
      const docs = data.documents || [];

      docs.forEach(d => {
        if(seen.has(d.id)) return;
        seen.add(d.id);

        const dist = parseFloat(d.distance) || 0;
        if(dist > 1500) return;

        // 마사지·스파 등 음식 무관 업종 제외
        const catLower = (d.category_name || "").toLowerCase();
        const nameLower = (d.place_name || "").toLowerCase();
        const isNonFood = ["마사지","스파","안마","피부","네일","헬스","헬스케어","병원","약국","미용","숙박","주차"].some(w => nameLower.includes(w) || catLower.includes(w));
        if(isNonFood) return;

        allResults.push({
          id: d.id,
          name: d.place_name,
          lat: parseFloat(d.y),
          lng: parseFloat(d.x),
          category: d.category_name || "",
          addr: d.road_address_name || d.address_name || "",
          phone: d.phone || "",
          distance: dist,
          placeUrl: d.place_url || ""
        });
      });
    }catch(e){ console.error("카카오 검색 오류:", e); }
  }

  allResults.sort((a, b) => a.distance - b.distance);
  return allResults.slice(0, 15);
}

// TOP3 선정 전 주변 식당 존재 여부 확인
async function verifyAndGetTop3(answers, lat, lng){
  const candidates=getTop3candidates(answers); // 상위 후보 최대 9개
  const verified=[];
  for(const rec of candidates){
    if(verified.length>=3)break;
    const rests=await searchNearby(lat,lng,rec);
    if(rests.length>0)verified.push({rec,rests});
  }
  return verified; // [{rec, rests}, ...]
}

function getTop3candidates(answers){
  const a={};answers.forEach(x=>a[x.questionId]=x.value);
  const all=Object.keys(FOOD_DB);
  function score(key){
    const f=FOOD_DB[key];let s=0;
    if(a.cuisine==="korean"&&f.cuisine==="korean")s+=10;
    else if(a.cuisine==="asian"&&["japanese","vietnamese","thai"].includes(f.cuisine))s+=10;
    else if(a.cuisine==="chinese"&&f.cuisine==="chinese")s+=10;
    else if(a.cuisine==="western"&&["western","italian","cafe"].includes(f.cuisine))s+=10;
    else if(a.cuisine==="any_cuisine")s+=3;
    else s-=4;
    const spicyF=["kimchi_jjigae","budae","dakgalbi","tteokbokki","fire_chicken","malatang","jjambbong","tom_yum"];
    const warmF=["sundubu","doenjang","gamjatang","galbitang","samgyetang","seolleongtang","kalguksu","gukbap","udon","ramen","pho","jjajang","curry_jp","budae"];
    const lightF=["salad","cafe","bakery","bingsu","kimbap","banh_mi","brunch","naengmyeon"];
    const specialF=["steak","sushi","sashimi","korean_bbq","risotto","bbq_ribs","dimsum","jokbal"];
    const drinksF=["jeon","samgyeopsal","korean_bbq","gopchang","yanggochi","jokbal","bossam","chicken","dakgalbi"];
    if(a.mood==="spicy"){if(spicyF.includes(key))s+=8;else if(lightF.includes(key))s-=3}
    if(a.mood==="warm"){if(warmF.includes(key))s+=7;else if(lightF.includes(key))s-=2}
    if(a.mood==="light"){if(lightF.includes(key))s+=8;else if(spicyF.includes(key))s-=4}
    if(a.mood==="special"){if(specialF.includes(key))s+=8;else s-=1}
    if(a.mood==="drinks"){if(drinksF.includes(key))s+=8}
    if(a.meal==="breakfast"){if(["brunch","cafe","bakery","salad"].includes(key))s+=7}
    if(a.meal==="snack"){if(["tteokbokki","kimbap","bingsu","bakery","chicken"].includes(key))s+=7}
    if(a.meal==="dinner"||a.meal==="early_dinner"){if(["steak","korean_bbq","samgyeopsal","sushi","sashimi","bossam","bbq_ribs","jokbal"].includes(key))s+=4}
    if(a.company==="solo"){if(["ramen","udon","kalguksu","gukbap","jjajang","jjambbong","curry_jp","kimbap","bibimbap","katsu"].includes(key))s+=5}
    if(a.company==="couple"){if(["steak","sushi","pasta","risotto","brunch","pizza","samgyeopsal"].includes(key))s+=4}
    if(a.company==="large"){if(["korean_bbq","samgyeopsal","dakgalbi","malatang","yanggochi","chicken","budae","bossam"].includes(key))s+=5}
    if(a.company==="business"){if(["steak","sushi","sashimi","risotto","galbitang","dimsum","pasta"].includes(key))s+=6}
    const p=f.price||10000;
    if(a.budget==="cheap"){if(p<=8000)s+=9;else if(p<=12000)s+=3;else s-=5}
    if(a.budget==="mid"){if(p>8000&&p<=18000)s+=7;else if(p<=8000)s+=3;else s-=3}
    if(a.budget==="expensive"){if(p>15000&&p<=35000)s+=7;else if(p<=15000)s-=2}
    if(a.budget==="flex"){if(p>=30000)s+=9;else if(p>=20000)s+=5;else s-=3}
    if(a.budget==="any_budget")s+=2; // 예산 무관 → 모든 음식에 소폭 가산
    s+=Math.random()*2.5;
    return s;
  }
  const scored=all.map(k=>({key:k,score:score(k),cuisine:FOOD_DB[k].cuisine})).sort((a,b)=>b.score-a.score);
  // 다양한 cuisine 확보하면서 상위 9개 후보 반환
  const result=[];
  const seen=new Set();
  for(const s of scored){
    if(result.length>=9)break;
    result.push({...FOOD_DB[s.key],key:s.key});
  }
  return result;
}

// ── Kakao Map ──
let kakaoMapInstance=null;
let kakaoMarkers=[];
let kakaoOverlays=[];
let openOverlay=null;

function initKakaoMap(loc, restaurants){
  const mapEl=document.getElementById('kakao-map');
  if(!mapEl||typeof kakao==='undefined')return;
  document.getElementById('map-loading').style.display='none';

  const center=new kakao.maps.LatLng(loc.lat, loc.lng);
  const map=new kakao.maps.Map(mapEl,{center, level:4});
  kakaoMapInstance=map;
  kakaoMarkers=[];
  kakaoOverlays=[];
  openOverlay=null;

  // 내 위치 마커
  new kakao.maps.CustomOverlay({
    map,
    position: center,
    content: '<div style="width:16px;height:16px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(66,133,244,.7)"></div>',
    zIndex: 10
  });

  if(restaurants.length===0)return;

  const bounds=new kakao.maps.LatLngBounds();
  bounds.extend(center);

  restaurants.forEach((r,i)=>{
    const pos=new kakao.maps.LatLng(r.lat, r.lng);
    bounds.extend(pos);

    // 마커
    const markerColor=r.matchScore>=10?'#4ade80':r.matchScore>=5?'#FF9F1C':'#FF6B35';
    const marker=new kakao.maps.CustomOverlay({
      map,
      position: pos,
      content: `<div onclick="focusMarker(${i})" style="width:32px;height:32px;background:${markerColor};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 3px 10px rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.3);cursor:pointer">🍽️</div>`,
      zIndex: 3
    });
    kakaoMarkers.push(marker);

    // 인포윈도우 (커스텀 오버레이)
    const overlay=new kakao.maps.CustomOverlay({
      position: pos,
      content: `<div class="kakao-iw">
        <div class="iw-name">${r.name}</div>
        ${r.category?`<div class="iw-addr" style="color:#FF9F1C">📂 ${r.category.split('>').pop().trim()}</div>`:''}
        <div class="iw-dist">📏 ${formatDist(r.distance)}</div>
        ${r.addr?`<div class="iw-addr">📍 ${r.addr}</div>`:''}
        ${r.phone?`<div class="iw-addr">📞 ${r.phone}</div>`:''}
      </div>`,
      zIndex: 5,
      yAnchor: 1.4
    });
    kakaoOverlays.push(overlay);
  });

  map.setBounds(bounds, 60, 60, 60, 60);

  // 지도 클릭 시 오버레이 닫기
  kakao.maps.event.addListener(map,'click',()=>{
    if(openOverlay){openOverlay.setMap(null);openOverlay=null;}
    document.querySelectorAll('.rest-card').forEach(c=>c.style.borderColor='rgba(255,255,255,.08)');
  });
}

function focusMarker(idx){
  if(!kakaoMapInstance)return;
  const r=state.restaurants[idx];
  if(!r)return;
  const pos=new kakao.maps.LatLng(r.lat, r.lng);
  kakaoMapInstance.setCenter(pos);
  kakaoMapInstance.setLevel(3);
  if(openOverlay){openOverlay.setMap(null);}
  kakaoOverlays[idx].setMap(kakaoMapInstance);
  openOverlay=kakaoOverlays[idx];
  // 카드 하이라이트
  document.querySelectorAll('.rest-card').forEach((c,i)=>{
    c.style.borderColor=i===idx?'rgba(255,107,53,.5)':'rgba(255,255,255,.08)';
    c.style.background=i===idx?'rgba(255,107,53,.1)':'rgba(255,255,255,.04)';
  });
  // 스크롤
  const card=document.getElementById(`rest-card-${idx}`);
  if(card)card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function startQuiz(){setState({screen:"quiz",currentQ:0,answers:[]})}
function selectOption(qIdx,optIdx){
  const q=QUESTIONS[qIdx],opt=q.options[optIdx];
  document.querySelectorAll(".option-btn")[optIdx].classList.add("selected");
  setTimeout(()=>{
    const na=[...state.answers,{questionId:q.id,value:opt.value}];
    if(qIdx<QUESTIONS.length-1){
      setState({answers:na,currentQ:qIdx+1});
    }else{
      // 마지막 질문 → 일단 후보 기반으로 result 화면 (위치 없이)
      const recs=getTop3candidates(na).slice(0,3).map(r=>r);
      setState({answers:na,recommendations:recs,screen:"result"});
    }
  },350);
}
function restart(){setState({screen:"intro",currentQ:0,answers:[],recommendations:[],selectedRec:0,location:null,restaurants:[],allRests:null})}
function goBackToResult(){setState({screen:"result"})}
function selectRecAndFind(idx){setState({selectedRec:idx,screen:"locationPrompt"})}
function allowLocation(){
  if(navigator.geolocation){
    setState({screen:"finding"});
    navigator.geolocation.getCurrentPosition(
      pos=>doSearch(pos.coords.latitude,pos.coords.longitude),
      ()=>setState({screen:"locationError"}),
      {timeout:10000,enableHighAccuracy:true}
    );
  }else setState({screen:"locationError"});
}
async function doSearch(lat,lng){
  const selectedIdx = state.selectedRec;
  const existingRecs = state.recommendations; // result 화면에서 정해진 순위 그대로 사용
  setState({screen:"finding",location:{lat,lng}});

  // 이미 추천 순위가 정해진 경우 → 그대로 사용, 식당만 새로 검색
  if(existingRecs && existingRecs.length > 0){
    // 선택한 순위의 식당 검색
    const targetRests = await searchNearby(lat, lng, existingRecs[selectedIdx]);
    // 나머지 순위도 미리 검색해서 캐시
    const allRests = [null, null, null];
    allRests[selectedIdx] = targetRests;
    setState({recommendations:existingRecs, selectedRec:selectedIdx, screen:"map", restaurants:targetRests, location:{lat,lng}, allRests});
    return;
  }

  // 처음 검색하는 경우 (추천 없을 때 fallback)
  const verified = await verifyAndGetTop3(state.answers, lat, lng);
  if(verified.length===0){ setState({screen:"noResult"}); return; }
  const recs = verified.map(v=>v.rec);
  const targetIdx = Math.min(selectedIdx, verified.length-1);
  setState({recommendations:recs, selectedRec:targetIdx, screen:"map", restaurants:verified[targetIdx].rests, location:{lat,lng}});
}
async function switchRec(idx){
  const loc=state.location; if(!loc) return;
  // 이미 캐시된 결과가 있으면 바로 사용
  if(state.allRests && state.allRests[idx]){
    setState({selectedRec:idx, restaurants:state.allRests[idx]});
    return;
  }
  setState({selectedRec:idx, screen:"finding"});
  const restaurants = await searchNearby(loc.lat, loc.lng, state.recommendations[idx]);
  // 캐시 저장
  const allRests = state.allRests ? [...state.allRests] : [null,null,null];
  allRests[idx] = restaurants;
  setState({screen:"map", restaurants, location:loc, selectedRec:idx, allRests});
}
async function refreshSearch(){
  const loc=state.location;if(!loc){setState({screen:"locationPrompt"});return}
  setState({screen:"finding"});
  const restaurants=await searchNearby(loc.lat,loc.lng,state.recommendations[state.selectedRec]);
  setState({screen:"map",restaurants,location:loc});
}

render();
</script>
