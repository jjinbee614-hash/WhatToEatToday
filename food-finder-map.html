function getTop3(answers){
  const a={};answers.forEach(x=>a[x.questionId]=x.value);
  const all=Object.keys(FOOD_DB);
  function score(key){
    const f=FOOD_DB[key];let s=0;
    // Cuisine
    if(a.cuisine==="korean"&&f.cuisine==="korean")s+=10;
    else if(a.cuisine==="asian"&&["japanese","chinese","vietnamese","thai"].includes(f.cuisine))s+=10;
    else if(a.cuisine==="western"&&["western","italian","cafe"].includes(f.cuisine))s+=10;
    else if(a.cuisine==="any_cuisine")s+=3;
    else s-=4;
    // Mood
    const spicyF=["kimchi_jjigae","budae","dakgalbi","tteokbokki","fire_chicken","malatang","jjambbong","tom_yum"];
    const warmF=["sundubu","doenjang","gamjatang","galbitang","samgyetang","seolleongtang","kalguksu","gukbap","udon","ramen","pho","jjajang","curry_jp","budae"];
    const lightF=["salad","cafe","bakery","bingsu","kimbap","banh_mi","brunch","naengmyeon"];
    const specialF=["steak","sushi","sashimi","korean_bbq","risotto","bbq_ribs","dimsum","jokbal"];
    if(a.mood==="spicy"){if(spicyF.includes(key))s+=8;else if(lightF.includes(key))s-=3}
    if(a.mood==="warm"){if(warmF.includes(key))s+=7;else if(lightF.includes(key))s-=2}
    if(a.mood==="light"){if(lightF.includes(key))s+=8;else if(spicyF.includes(key))s-=4}
    if(a.mood==="special"){if(specialF.includes(key))s+=8;else s-=1}
    // Meal
    if(a.meal==="breakfast"){if(["brunch","cafe","bakery","salad"].includes(key))s+=7}
    if(a.meal==="snack"){if(["tteokbokki","kimbap","bingsu","bakery","chicken"].includes(key))s+=7}
    if(a.meal==="dinner"){if(["steak","korean_bbq","samgyeopsal","sushi","sashimi","bossam","bbq_ribs","jokbal"].includes(key))s+=4}
    // Company
    if(a.company==="solo"){if(["ramen","udon","kalguksu","gukbap","jjajang","jjambbong","curry_jp","kimbap","bibimbap","katsu"].includes(key))s+=5}
    if(a.company==="couple"){if(["steak","sushi","pasta","risotto","brunch","pizza","samgyeopsal"].includes(key))s+=4}
    if(a.company==="large"){if(["korean_bbq","samgyeopsal","dakgalbi","malatang","yanggochi","chicken","budae","bossam"].includes(key))s+=5}
    // Budget
    const p=f.price||10000;
    if(a.budget==="cheap"){if(p<=8000)s+=9;else if(p<=12000)s+=3;else s-=5}
    if(a.budget==="mid"){if(p>8000&&p<=18000)s+=7;else if(p<=8000)s+=3;else s-=3}
    if(a.budget==="expensive"){if(p>15000&&p<=35000)s+=7;else if(p<=15000)s-=2}
    if(a.budget==="flex"){if(p>=30000)s+=9;else if(p>=20000)s+=5;else s-=3}
    s+=Math.random()*2.5;
    return s;
  }
  const scored=all.map(k=>({key:k,score:score(k),cuisine:FOOD_DB[k].cuisine})).sort((a,b)=>b.score-a.score);
  const result=[scored[0]];
  for(let i=1;i<scored.length&&result.length<3;i++){
    if(result.every(r=>r.cuisine!==scored[i].cuisine)||result.length===2)result.push(scored[i]);
  }
  return result.map(r=>({...FOOD_DB[r.key],key:r.key}));
}

function getDistance(la1,lo1,la2,lo2){const R=6371000,r=Math.PI/180,dL=(la2-la1)*r,dG=(lo2-lo1)*r;const a=Math.sin(dL/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}

async function searchNearby(lat, lng, rec){
  const radius = 1000;
  const strictKw = (FOOD_MENU[rec.key] || {}).strict || rec.search || [];

  const seen = new Set();
  let allResults = [];

  for(const kw of strictKw.slice(0, 4)){
    try{
      const qs = new URLSearchParams({
        query: kw + " 음식점",   // ← "음식점" 붙여서 마사지 등 제외
        x: lng,
        y: lat,
        radius: radius,
        size: 15,
        category_group_code: "FD6"  // ← 카카오 음식점 카테고리만
      });
      const res = await fetch(`/api/kakao/search?${qs}`);
      const data = await res.json();
      const docs = data.documents || [];

      docs.forEach(d => {
        if(seen.has(d.id)) return;
        seen.add(d.id);

        const dist = parseFloat(d.distance) || 0;
        if(dist > 1000) return;

        const placeName = d.place_name || "";
        const placeNameLower = placeName.toLowerCase();
        const categoryName = (d.category_name || "").toLowerCase();

        // 음식점 카테고리인지 확인 (FD6=음식점, CE7=카페)
        const isFoodCategory = categoryName.includes("음식점") || 
                               categoryName.includes("카페") ||
                               categoryName.includes("식당") ||
                               categoryName.includes("푸드");
        if(!isFoodCategory) return;

        // 이름에 키워드 포함 여부 (엄격 필터)
        const kwLower = kw.toLowerCase();
        if(!placeNameLower.includes(kwLower)) return;

        allResults.push({
          id: d.id,
          name: placeName,
          lat: parseFloat(d.y),
          lng: parseFloat(d.x),
          category: d.category_name || "",
          addr: d.road_address_name || d.address_name || "",
          phone: d.phone || "",
          distance: dist,
          placeUrl: d.place_url || ""
        });
      });
    }catch(e){ console.error("카카오 검색 오류:", e); }
  }

  allResults.sort((a, b) => a.distance - b.distance);
  return allResults.slice(0, 10);
}

async function verifyAndGetTop3(answers, lat, lng){
  const candidates=getTop3candidates(answers); // 상위 후보 최대 9개
  const verified=[];
  for(const rec of candidates){
    if(verified.length>=3)break;
    const rests=await searchNearby(lat,lng,rec);
    if(rests.length>0)verified.push({rec,rests});
  }
  return verified; // [{rec, rests}, ...]
}

    if(a.company==="large"){if(["korean_bbq","samgyeopsal","dakgalbi","malatang","yanggochi","chicken","budae","bossam"].includes(key))s+=5}
    const p=f.price||10000;
    if(a.budget==="cheap"){if(p<=8000)s+=9;else if(p<=12000)s+=3;else s-=5}
    if(a.budget==="mid"){if(p>8000&&p<=18000)s+=7;else if(p<=8000)s+=3;else s-=3}
    if(a.budget==="expensive"){if(p>15000&&p<=35000)s+=7;else if(p<=15000)s-=2}
    if(a.budget==="flex"){if(p>=30000)s+=9;else if(p>=20000)s+=5;else s-=3}
    s+=Math.random()*2.5;
    return s;
  }
  const scored=all.map(k=>({key:k,score:score(k),cuisine:FOOD_DB[k].cuisine})).sort((a,b)=>b.score-a.score);
  // 다양한 cuisine 확보하면서 상위 9개 후보 반환
  const result=[];
  const seen=new Set();
  for(const s of scored){
    if(result.length>=9)break;
    result.push({...FOOD_DB[s.key],key:s.key});
  }
  return result;
}

// ── Kakao Map ──
let kakaoMapInstance=null;
let kakaoMarkers=[];
let kakaoOverlays=[];
let openOverlay=null;

function initKakaoMap(loc, restaurants){
  const mapEl=document.getElementById('kakao-map');
  if(!mapEl||typeof kakao==='undefined')return;
  document.getElementById('map-loading').style.display='none';

  const center=new kakao.maps.LatLng(loc.lat, loc.lng);
  const map=new kakao.maps.Map(mapEl,{center, level:4});
  kakaoMapInstance=map;
  kakaoMarkers=[];
  kakaoOverlays=[];
  openOverlay=null;

  // 내 위치 마커
  new kakao.maps.CustomOverlay({
    map,
    position: center,
    content: '<div style="width:16px;height:16px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(66,133,244,.7)"></div>',
    zIndex: 10
  });

  if(restaurants.length===0)return;

  const bounds=new kakao.maps.LatLngBounds();
  bounds.extend(center);

  restaurants.forEach((r,i)=>{
    const pos=new kakao.maps.LatLng(r.lat, r.lng);
    bounds.extend(pos);

    // 마커
    const markerColor=r.matchScore>=10?'#4ade80':r.matchScore>=5?'#FF9F1C':'#FF6B35';
    const marker=new kakao.maps.CustomOverlay({
      map,
      position: pos,
      content: `<div onclick="focusMarker(${i})" style="width:32px;height:32px;background:${markerColor};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 3px 10px rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.3);cursor:pointer">🍽️</div>`,
      zIndex: 3
    });
    kakaoMarkers.push(marker);

    // 인포윈도우 (커스텀 오버레이)
    const overlay=new kakao.maps.CustomOverlay({
      position: pos,
      content: `<div class="kakao-iw">
        <div class="iw-name">${r.name}</div>
        ${r.category?`<div class="iw-addr" style="color:#FF9F1C">📂 ${r.category.split('>').pop().trim()}</div>`:''}
        <div class="iw-dist">📏 ${formatDist(r.distance)}</div>
        ${r.addr?`<div class="iw-addr">📍 ${r.addr}</div>`:''}
        ${r.phone?`<div class="iw-addr">📞 ${r.phone}</div>`:''}
      </div>`,
      zIndex: 5,
      yAnchor: 1.4
    });
    kakaoOverlays.push(overlay);
  });

  map.setBounds(bounds, 60, 60, 60, 60);

  // 지도 클릭 시 오버레이 닫기
  kakao.maps.event.addListener(map,'click',()=>{
    if(openOverlay){openOverlay.setMap(null);openOverlay=null;}
    document.querySelectorAll('.rest-card').forEach(c=>c.style.borderColor='rgba(255,255,255,.08)');
  });
}

function focusMarker(idx){
  if(!kakaoMapInstance)return;
  const r=state.restaurants[idx];
  if(!r)return;
  const pos=new kakao.maps.LatLng(r.lat, r.lng);
  kakaoMapInstance.setCenter(pos);
  kakaoMapInstance.setLevel(3);
  if(openOverlay){openOverlay.setMap(null);}
  kakaoOverlays[idx].setMap(kakaoMapInstance);
  openOverlay=kakaoOverlays[idx];
  // 카드 하이라이트
  document.querySelectorAll('.rest-card').forEach((c,i)=>{
    c.style.borderColor=i===idx?'rgba(255,107,53,.5)':'rgba(255,255,255,.08)';
    c.style.background=i===idx?'rgba(255,107,53,.1)':'rgba(255,255,255,.04)';
  });
  // 스크롤
  const card=document.getElementById(`rest-card-${idx}`);
  if(card)card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function startQuiz(){setState({screen:"quiz",currentQ:0,answers:[]})}
function selectOption(qIdx,optIdx){
  const q=QUESTIONS[qIdx],opt=q.options[optIdx];
  document.querySelectorAll(".option-btn")[optIdx].classList.add("selected");
  setTimeout(()=>{
    const na=[...state.answers,{questionId:q.id,value:opt.value}];
    if(qIdx<QUESTIONS.length-1){
      setState({answers:na,currentQ:qIdx+1});
    }else{
      // 마지막 질문 → 일단 후보 기반으로 result 화면 (위치 없이)
      const recs=getTop3candidates(na).slice(0,3).map(r=>r);
      setState({answers:na,recommendations:recs,screen:"result"});
    }
  },350);
}
function restart(){setState({screen:"intro",currentQ:0,answers:[],recommendations:[],selectedRec:0,location:null,restaurants:[]})}
function goBackToResult(){setState({screen:"result"})}
function selectRecAndFind(idx){setState({selectedRec:idx,screen:"locationPrompt"})}
function allowLocation(){
  if(navigator.geolocation){
    setState({screen:"finding"});
    navigator.geolocation.getCurrentPosition(
      pos=>doSearch(pos.coords.latitude,pos.coords.longitude),
      ()=>setState({screen:"locationError"}),
      {timeout:10000,enableHighAccuracy:true}
    );
  }else setState({screen:"locationError"});
}
async function doSearch(lat,lng){
  setState({screen:"finding",location:{lat,lng}});
  // 위치 확인 후 TOP3 검증 — 주변에 없으면 해당 음식 제외
  const verified=await verifyAndGetTop3(state.answers,lat,lng);
  if(verified.length===0){
    // 주변에 아무것도 없으면 안내
    setState({screen:"noResult"});
    return;
  }
  const recs=verified.map(v=>v.rec);
  const firstRests=verified[0].rests;
  setState({recommendations:recs,selectedRec:0,screen:"map",restaurants:firstRests,location:{lat,lng}});
}
async function switchRec(idx){
  const loc=state.location;if(!loc)return;
  setState({selectedRec:idx,screen:"finding"});
  const restaurants=await searchNearby(loc.lat,loc.lng,state.recommendations[idx]);
  setState({screen:"map",restaurants,location:loc,selectedRec:idx});
}
async function refreshSearch(){
  const loc=state.location;if(!loc){setState({screen:"locationPrompt"});return}
  setState({screen:"finding"});
  const restaurants=await searchNearby(loc.lat,loc.lng,state.recommendations[state.selectedRec]);
  setState({screen:"map",restaurants,location:loc});
}

render();
</script>
