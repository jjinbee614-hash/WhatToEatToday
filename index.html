<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>결정장애 — 당신의 결정을 대신 해드립니다</title>
<meta name="description" content="오늘 뭐 먹지? 뭐 입지? 뭐 볼까? 결정장애가 대신 결정해드려요."/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;
  --card:#13131e;
  --border:rgba(255,255,255,.07);
  --text:#f0ede8;
  --muted:#5a5875;
  --accent:#ff4d6d;
  --accent2:#ff8fa3;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* 배경 노이즈 */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.03;pointer-events:none;z-index:0}

/* 오브 배경 */
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(255,77,109,.12),transparent 70%);top:-100px;right:-100px;animation:drift1 16s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(100,60,200,.08),transparent 70%);bottom:-80px;left:-80px;animation:drift2 20s ease-in-out infinite}

.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 20px 120px}

/* 헤더 */
.header{text-align:center;margin-bottom:72px}
.brand-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;border:1px solid rgba(255,77,109,.3);padding:5px 14px;border-radius:20px;margin-bottom:28px;animation:fadeUp .6s ease both}
.brand-title{font-size:clamp(52px,12vw,88px);font-weight:900;line-height:.95;letter-spacing:-.04em;margin-bottom:20px;animation:fadeUp .6s .1s ease both}
.brand-title .highlight{color:var(--accent);position:relative;display:inline-block}
.brand-title .highlight::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:3px;background:var(--accent);border-radius:2px;transform:scaleX(0);transform-origin:left;animation:underline .5s .7s ease forwards}
.brand-sub{font-size:16px;color:var(--muted);font-weight:300;line-height:1.7;animation:fadeUp .6s .2s ease both}
.divider{width:1px;height:48px;background:linear-gradient(180deg,transparent,var(--accent),transparent);margin:32px auto;animation:fadeUp .6s .3s ease both}

/* 카드 그리드 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:480px}

.card{border-radius:20px;border:1px solid var(--border);background:var(--card);padding:24px 20px 20px;cursor:pointer;text-decoration:none;color:var(--text);transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:20px}
.card:hover{transform:translateY(-5px)}
.card:hover::before{opacity:1}

/* 각 카드 컬러 */
.card-eat{--c:#ff6b35;--cg:rgba(255,107,53,.12)}
.card-eat::before{background:radial-gradient(circle at 30% 30%,var(--cg),transparent 60%)}
.card-eat:hover{border-color:rgba(255,107,53,.3);box-shadow:0 20px 60px rgba(255,107,53,.1)}

.card-wear{--c:#63b3ed;--cg:rgba(99,179,237,.12)}
.card-wear::before{background:radial-gradient(circle at 30% 30%,var(--cg),transparent 60%)}
.card-wear:hover{border-color:rgba(99,179,237,.3);box-shadow:0 20px 60px rgba(99,179,237,.1)}

.card-watch{--c:#ff4d6d;--cg:rgba(255,77,109,.12)}
.card-watch::before{background:radial-gradient(circle at 30% 30%,var(--cg),transparent 60%)}
.card-watch:hover{border-color:rgba(255,77,109,.3);box-shadow:0 20px 60px rgba(255,77,109,.1)}

.card-do{--c:#9a75ea;--cg:rgba(154,117,234,.12)}
.card-do::before{background:radial-gradient(circle at 30% 30%,var(--cg),transparent 60%)}
.card-do:hover{border-color:rgba(154,117,234,.3);box-shadow:0 20px 60px rgba(154,117,234,.1)}

.card-emoji{font-size:32px;line-height:1;margin-bottom:2px}
.card-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted);margin-bottom:4px;width:fit-content}
.card-badge.live{background:rgba(255,107,53,.15);color:#ff9f6b}
.card-badge.live-blue{background:rgba(99,179,237,.15);color:#63b3ed}
.card-badge.live-red{background:rgba(255,77,109,.15);color:#ff4d6d}
.card-title{font-size:20px;font-weight:900;letter-spacing:-.03em;line-height:1.2}
.card-desc{font-size:11px;color:var(--muted);line-height:1.6;font-weight:300}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px}
.card-path{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em}
.card-arrow{font-size:16px;color:var(--muted);transition:transform .2s,color .2s}
.card:hover .card-arrow{transform:translateX(4px);color:var(--c)}

/* 준비중 카드 */
.card-soon{opacity:.45;cursor:default;pointer-events:none}

/* 푸터 */
.footer{margin-top:64px;text-align:center;animation:fadeUp .6s .5s ease both}
.footer-brand{font-size:22px;font-weight:900;letter-spacing:-.03em;margin-bottom:6px}
.footer-brand span{color:var(--accent)}
.footer-copy{font-size:11px;color:var(--muted);font-weight:300}

/* 카드 애니메이션 */
.card:nth-child(1){animation:fadeUp .5s .3s ease both;opacity:0}
.card:nth-child(2){animation:fadeUp .5s .38s ease both;opacity:0}
.card:nth-child(3){animation:fadeUp .5s .46s ease both;opacity:0}
.card:nth-child(4){animation:fadeUp .5s .54s ease both;opacity:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-20px)}}
@keyframes underline{to{transform:scaleX(1)}}

/* 애드핏 */
.ad-wrap{position:fixed;bottom:0;left:0;right:0;z-index:99;display:flex;justify-content:center;align-items:center;background:rgba(10,10,15,.97);padding:8px 0;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <header class="header">
    <div class="brand-tag">오늘도 못 고르셨나요?</div>
    <h1 class="brand-title"><span class="highlight">결정장애</span></h1>
    <p class="brand-sub">당신의 결정을 대신 해드립니다</p>
    <div class="divider"></div>
  </header>

  <div class="grid">
    <!-- 뭐 먹지 -->
    <a class="card card-eat" href="/eat">
      <div class="card-emoji">🍽️</div>
      <div class="card-badge live">LIVE</div>
      <div class="card-title">오늘<br>뭐 먹지?</div>
      <div class="card-desc">취향 테스트로<br>맞춤 맛집 추천</div>
      <div class="card-footer">
        <span class="card-path">/eat</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- 뭐 입지 -->
    <a class="card card-wear" href="/wear">
      <div class="card-emoji">👔</div>
      <div class="card-badge live-blue">LIVE</div>
      <div class="card-title">오늘<br>뭐 입지?</div>
      <div class="card-desc">날씨·기온 맞춤<br>코디 추천</div>
      <div class="card-footer">
        <span class="card-path">/wear</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- 뭐 볼까 -->
    <a class="card card-watch" href="/watch">
      <div class="card-emoji">🎬</div>
      <div class="card-badge live-red">LIVE</div>
      <div class="card-title">오늘<br>뭐 볼까?</div>
      <div class="card-desc">넷플릭스·유튜브<br>콘텐츠 추천</div>
      <div class="card-footer">
        <span class="card-path">/watch</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- 뭐 하지 -->
    <div class="card card-do card-soon">
      <div class="card-emoji">🎯</div>
      <div class="card-badge">준비중</div>
      <div class="card-title">오늘<br>뭐 하지?</div>
      <div class="card-desc">기분·날씨 맞춤<br>활동 추천</div>
      <div class="card-footer">
        <span class="card-path">/do</span>
        <span class="card-arrow">→</span>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-brand">결정<span>장애</span></div>
    <div class="footer-copy">© 2025 결정장애. All rights reserved.</div>
  </footer>
</div>

<!-- 카카오 애드핏 -->
<div class="ad-wrap">
  <ins class="kakao_ad_area" style="display:none;" data-ad-unit="DAN-w1b5n8JUEWiLvW95" data-ad-width="320" data-ad-height="50"></ins>
  <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
</div>

</body>
</html>
