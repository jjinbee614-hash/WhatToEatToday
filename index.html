<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>What2Today — 오늘 하루의 모든 결정</title>
<meta name="description" content="오늘 뭐 먹지? 뭐 입지? 뭐 하지? 오늘 하루의 모든 결정을 도와드려요."/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070e;
  --card:#111120;
  --card2:#181828;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --text:#ede9e1;
  --muted:#5a5870;
  --border:rgba(255,255,255,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Background */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.5}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(20,8,40,.9),transparent 70%);top:-100px;right:-100px;animation:o1 14s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(5,20,15,.9),transparent 70%);bottom:-80px;left:-80px;animation:o2 18s ease-in-out infinite}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(201,168,76,.05),transparent 70%);top:40%;left:30%;animation:o3 11s ease-in-out infinite}

/* Layout */
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 20px 80px}

/* Header */
.header{text-align:center;margin-bottom:64px}
.logo{font-size:13px;font-weight:700;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:20px;opacity:.9}
.title{font-size:clamp(36px,8vw,56px);font-weight:900;line-height:1.1;letter-spacing:-.03em;margin-bottom:16px}
.title span{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:15px;color:var(--muted);font-weight:300;line-height:1.7}
.divider{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px auto 0}

/* Cards Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:480px}
.card{border-radius:20px;border:1px solid var(--border);background:var(--card);padding:28px 24px;cursor:pointer;text-decoration:none;color:var(--text);transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px}
.card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s}
.card:hover{transform:translateY(-4px);box-shadow:0 24px 60px rgba(0,0,0,.5)}
.card:hover::before{opacity:1}

/* EAT */
.card-eat{border-color:rgba(201,168,76,.15)}
.card-eat::before{background:linear-gradient(135deg,rgba(201,168,76,.08),transparent)}
.card-eat:hover{border-color:rgba(201,168,76,.35);box-shadow:0 24px 60px rgba(201,168,76,.1)}
.card-eat .card-icon{color:#c9a84c}
.card-eat .card-tag{background:rgba(201,168,76,.12);color:#c9a84c}
.card-eat .card-badge{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#060400}

/* WEAR */
.card-wear{border-color:rgba(99,179,237,.1)}
.card-wear::before{background:linear-gradient(135deg,rgba(99,179,237,.07),transparent)}
.card-wear:hover{border-color:rgba(99,179,237,.3);box-shadow:0 24px 60px rgba(99,179,237,.08)}
.card-wear .card-icon{color:#63b3ed}
.card-wear .card-tag{background:rgba(99,179,237,.1);color:#63b3ed}
.card-wear .card-badge{background:rgba(99,179,237,.15);color:#63b3ed}

/* DO */
.card-do{border-color:rgba(154,117,234,.1)}
.card-do::before{background:linear-gradient(135deg,rgba(154,117,234,.07),transparent)}
.card-do:hover{border-color:rgba(154,117,234,.3);box-shadow:0 24px 60px rgba(154,117,234,.08)}
.card-do .card-icon{color:#9a75ea}
.card-do .card-tag{background:rgba(154,117,234,.1);color:#9a75ea}
.card-do .card-badge{background:rgba(154,117,234,.15);color:#9a75ea}

/* WATCH */
.card-watch{border-color:rgba(252,129,129,.1)}
.card-watch::before{background:linear-gradient(135deg,rgba(252,129,129,.07),transparent)}
.card-watch:hover{border-color:rgba(252,129,129,.3);box-shadow:0 24px 60px rgba(252,129,129,.08)}
.card-watch .card-icon{color:#fc8181}
.card-watch .card-tag{background:rgba(252,129,129,.1);color:#fc8181}
.card-watch .card-badge{background:rgba(252,129,129,.15);color:#fc8181}

.card-icon{font-size:32px;line-height:1}
.card-top{display:flex;align-items:flex-start;justify-content:space-between}
.card-badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:20px}
.card-title{font-size:16px;font-weight:800;letter-spacing:-.02em;line-height:1.3}
.card-desc{font-size:11px;color:var(--muted);line-height:1.6;font-weight:300}
.card-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:20px}
.card-arrow{font-size:14px;color:var(--muted);margin-top:auto;transition:transform .2s,color .2s}
.card:hover .card-arrow{transform:translateX(4px);color:inherit}

/* Soon overlay */
.card-soon{opacity:.5;cursor:default;pointer-events:none}
.card-soon:hover{transform:none;box-shadow:none}

/* Footer */
.footer{margin-top:56px;text-align:center}
.footer-logo{font-size:12px;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.footer-copy{font-size:11px;color:rgba(255,255,255,.2);font-weight:300}

/* Animations */
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-20px)}}
@keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,30px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.header{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) forwards}
.card:nth-child(1){animation:fadeUp .5s .1s cubic-bezier(.16,1,.3,1) both}
.card:nth-child(2){animation:fadeUp .5s .18s cubic-bezier(.16,1,.3,1) both}
.card:nth-child(3){animation:fadeUp .5s .26s cubic-bezier(.16,1,.3,1) both}
.card:nth-child(4){animation:fadeUp .5s .34s cubic-bezier(.16,1,.3,1) both}
.footer{animation:fadeUp .5s .4s cubic-bezier(.16,1,.3,1) both}
</style>
</head>
<body>
<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="wrap">
  <header class="header">
    <div class="logo">What2Today</div>
    <h1 class="title">오늘, 뭐<span>?</span></h1>
    <p class="subtitle">오늘 하루의 모든 결정을<br>대신 도와드려요</p>
    <div class="divider"></div>
  </header>

  <div class="grid">
    <!-- EAT -->
    <a class="card card-eat" href="/eat">
      <div class="card-top">
        <span class="card-icon">🍽️</span>
        <span class="card-badge">LIVE</span>
      </div>
      <div>
        <div class="card-title">오늘<br>뭐 먹지?</div>
        <div class="card-desc" style="margin-top:6px">취향 테스트로<br>맞춤 맛집 추천</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="card-tag">/eat</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- WEAR -->
    <div class="card card-wear card-soon">
      <div class="card-top">
        <span class="card-icon">👔</span>
        <span class="card-badge">준비중</span>
      </div>
      <div>
        <div class="card-title">오늘<br>뭐 입지?</div>
        <div class="card-desc" style="margin-top:6px">날씨·일정에 맞는<br>코디 추천</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="card-tag">/wear</span>
        <span class="card-arrow">→</span>
      </div>
    </div>

    <!-- DO -->
    <div class="card card-do card-soon">
      <div class="card-top">
        <span class="card-icon">🎯</span>
        <span class="card-badge">준비중</span>
      </div>
      <div>
        <div class="card-title">오늘<br>뭐 하지?</div>
        <div class="card-desc" style="margin-top:6px">기분·날씨로<br>활동 추천</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="card-tag">/do</span>
        <span class="card-arrow">→</span>
      </div>
    </div>

    <!-- WATCH -->
    <div class="card card-watch card-soon">
      <div class="card-top">
        <span class="card-icon">🎬</span>
        <span class="card-badge">준비중</span>
      </div>
      <div>
        <div class="card-title">오늘<br>뭐 볼까?</div>
        <div class="card-desc" style="margin-top:6px">취향저격<br>콘텐츠 추천</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="card-tag">/watch</span>
        <span class="card-arrow">→</span>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">What2Today</div>
    <div class="footer-copy">© 2025 What2Today. All rights reserved.</div>
  </footer>
</div>
</body>
</html>
