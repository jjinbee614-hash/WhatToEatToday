<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>오늘 뭐 입지? — What2Today</title>
<meta name="description" content="기온과 상황에 맞는 오늘의 코디를 추천해드려요."/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0f6ff;
  --bg2:#e8f2ff;
  --card:#ffffff;
  --card2:#f5f9ff;
  --blue:#4a9edd;
  --blue2:#6db8f0;
  --blue-dark:#2d7fc0;
  --blue-light:#ddeeff;
  --text:#1a2a3a;
  --muted:#7a9ab5;
  --border:#d0e4f5;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Background */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px)}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(173,216,255,.6),transparent 70%);top:-100px;right:-100px;animation:o1 14s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(200,230,255,.5),transparent 70%);bottom:-80px;left:-80px;animation:o2 18s ease-in-out infinite}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,.8),transparent 70%);top:40%;left:25%;animation:o3 11s ease-in-out infinite}

.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px 100px;position:relative;z-index:2}
.container{width:100%;max-width:400px}

/* Progress */
.progress-wrap{margin-bottom:28px}
.progress-track{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue2));transition:width .6s cubic-bezier(.4,0,.2,1);border-radius:3px}
.progress-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* Buttons */
.btn-primary{width:100%;padding:16px 24px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:.04em;transition:all .3s ease;box-shadow:0 4px 20px rgba(74,158,221,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(74,158,221,.4)}
.btn-ghost{width:100%;padding:14px 24px;border-radius:14px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .25s ease}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}

/* Options */
.options-list{display:flex;flex-direction:column;gap:8px}
.option-btn{width:100%;padding:15px 18px;border-radius:14px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .22s ease;text-align:left;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(74,158,221,.06)}
.opt-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:all .22s ease}
.option-btn:hover{border-color:var(--blue);background:var(--blue-light);transform:translateX(3px)}
.option-btn:hover .opt-dot{background:var(--blue)}
.option-btn.selected{border-color:var(--blue);background:var(--blue-light)}
.option-btn.selected .opt-dot{background:var(--blue);box-shadow:0 0 0 3px rgba(74,158,221,.2)}

/* Outfit Card */
.outfit-card{border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;overflow:hidden;box-shadow:0 4px 24px rgba(74,158,221,.08)}
.outfit-card-header{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.outfit-rank{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.rank-1{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff}
.rank-2{background:rgba(74,158,221,.12);color:var(--blue)}
.rank-3{background:var(--border);color:var(--muted)}
.outfit-name{font-size:16px;font-weight:800;flex:1;color:var(--text)}

/* Tabs */
.tab-row{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{flex:1;padding:9px 4px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;text-align:center;line-height:1.6}
.tab-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}

/* Item row */
.item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);margin-bottom:8px}
.item-name{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-btns{display:flex;gap:5px;flex-shrink:0}
.shop-m{padding:6px 10px;border-radius:8px;background:var(--blue);color:#fff;text-decoration:none;font-size:10px;font-weight:700;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:background .2s}
.shop-m:hover{background:var(--blue-dark)}
.shop-c{padding:6px 10px;border-radius:8px;background:#fff;border:1.5px solid #e5393e;color:#e5393e;text-decoration:none;font-size:10px;font-weight:700;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .2s}
.shop-c:hover{background:#fff5f5}

/* Ad */
.ad-wrap{position:fixed;bottom:0;left:0;right:0;z-index:999;display:flex;justify-content:center;align-items:center;background:rgba(240,246,255,.97);padding:8px 0;border-top:1px solid var(--border)}

@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-20px)}}
@keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,30px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleUp{from{opacity:0;transform:scale(.97) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.anim-scaleUp{animation:scaleUp .5s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.anim-fadeUp{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.anim-slideUp{animation:slideUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
</style>
</head>
<body>
<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="app">
  <div class="container" id="root"></div>
</div>

<!-- 카카오 애드핏 -->
<div class="ad-wrap">
  <ins class="kakao_ad_area" style="display:none;" data-ad-unit="DAN-w1b5n8JUEWiLvW95" data-ad-width="320" data-ad-height="50"></ins>
  <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
</div>

<script>
// ── 기온별 옷차림 DB ──
const TEMP_DB=[
  {
    min:28,max:999,
    label:"28°C 이상",desc:"한여름! 최대한 가볍게",icon:"☀️",
    items:{상의:["민소매","반팔 티셔츠","크롭탑"],하의:["반바지","숏팬츠","미니스커트"],아우터:[],기타:["선글라스","샌들"]}
  },
  {
    min:23,max:27,
    label:"23~27°C",desc:"더운 날씨, 가볍게",icon:"🌤️",
    items:{상의:["반팔 티셔츠","얇은 셔츠","반팔 블라우스"],하의:["반바지","면바지","얇은 슬랙스"],아우터:[],기타:["스니커즈"]}
  },
  {
    min:20,max:22,
    label:"20~22°C",desc:"활동하기 좋은 날씨",icon:"🌥️",
    items:{상의:["긴팔 티셔츠","얇은 셔츠","긴팔 블라우스"],하의:["면바지","청바지","7부바지"],아우터:["얇은 가디건"],기타:["운동화"]}
  },
  {
    min:17,max:19,
    label:"17~19°C",desc:"밤엔 쌀쌀해요",icon:"⛅",
    items:{상의:["맨투맨","후드티","얇은 니트"],하의:["청바지","슬랙스","면바지"],아우터:["가디건","바람막이"],기타:["운동화","로퍼"]}
  },
  {
    min:12,max:16,
    label:"12~16°C",desc:"겉옷 필수!",icon:"🌬️",
    items:{상의:["니트","기모 맨투맨","두꺼운 셔츠"],하의:["청바지","두꺼운 슬랙스","스타킹"],아우터:["자켓","가디건","야상"],기타:["부츠","로퍼"]}
  },
  {
    min:9,max:11,
    label:"9~11°C",desc:"트렌치코트의 계절",icon:"🌧️",
    items:{상의:["니트","두꺼운 맨투맨","기모티"],하의:["청바지","두꺼운 슬랙스","스타킹"],아우터:["트렌치코트","자켓","야상"],기타:["부츠","앵클부츠"]}
  },
  {
    min:5,max:8,
    label:"5~8°C",desc:"두꺼운 외투 필수",icon:"🌨️",
    items:{상의:["히트텍","두꺼운 니트","기모 내의"],하의:["두꺼운 청바지","레깅스","기모바지"],아우터:["코트","가죽자켓","패딩"],기타:["부츠","머플러"]}
  },
  {
    min:-99,max:4,
    label:"4°C 이하",desc:"완전무장! 최대한 따뜻하게",icon:"❄️",
    items:{상의:["히트텍","두꺼운 니트","내복"],하의:["기모바지","두꺼운 레깅스","내복 하의"],아우터:["롱패딩","두꺼운 코트","목도리+장갑"],기타:["방한부츠","귀마개","핫팩"]}
  }
];

function getTempDB(temp){
  return TEMP_DB.find(t=>temp>=t.min&&temp<=t.max)||TEMP_DB[TEMP_DB.length-1];
}

// ── 질문 ──
const QUESTIONS=[
  {id:"gender",emoji:"👤",question:"어떤 스타일을 주로 입으시나요?",options:[
    {label:"👔 남성 스타일",value:"male"},
    {label:"👗 여성 스타일",value:"female"},
    {label:"🧢 젠더리스 / 유니섹스",value:"unisex"}]},
  {id:"occasion",emoji:"📍",question:"오늘 어디 가시나요?",options:[
    {label:"💼 출근 / 비즈니스",value:"work"},
    {label:"💑 데이트",value:"date"},
    {label:"🛍️ 캐주얼 외출",value:"casual"},
    {label:"🏋️ 운동 / 액티비티",value:"sport"},
    {label:"🏠 집에서 편하게",value:"home"}]},
  {id:"style",emoji:"✨",question:"선호하는 스타일은?",options:[
    {label:"🖤 미니멀 / 베이직",value:"minimal"},
    {label:"😎 스트릿 / 캐주얼",value:"street"},
    {label:"💎 포멀 / 클래식",value:"formal"},
    {label:"🌿 내추럴 / 빈티지",value:"natural"},
    {label:"🎨 트렌디 / 유니크",value:"trendy"}]},
  {id:"color",emoji:"🎨",question:"오늘 선호하는 색감은?",options:[
    {label:"⬛ 무채색 (블랙·화이트·그레이)",value:"achromatic"},
    {label:"🤎 어스톤 (베이지·브라운·카키)",value:"earth"},
    {label:"🔵 쿨톤 (네이비·블루·그린)",value:"cool"},
    {label:"🌸 웜톤 (레드·핑크·오렌지)",value:"warm"},
    {label:"🎲 상관없어, 추천해줘",value:"any"}]},
  {id:"priority",emoji:"⚡",question:"오늘 가장 중요한 건?",options:[
    {label:"😎 스타일리쉬하게 보이고 싶어",value:"style"},
    {label:"🌿 편안하고 자연스럽게",value:"comfort"},
    {label:"💼 단정하고 깔끔하게",value:"neat"},
    {label:"🔥 오늘 좀 튀고 싶어",value:"unique"},
    {label:"⚡ 빠르게 결정하고 싶어",value:"quick"}]}
];

// ── 컬러 접두사 생성 ──
function colorPrefix(color, style){
  const c={
    achromatic:['블랙','화이트','그레이','차콜'],
    earth:['베이지','카키','브라운','크림'],
    cool:['네이비','블루','그린','인디고'],
    warm:['버건디','레드','코랄','오렌지'],
    any:['']
  };
  const colors = c[color]||[''];
  const idx = style==='minimal'?0 : style==='natural'?1 : style==='formal'?2 : style==='street'?3 : 0;
  return colors[idx%colors.length] ? colors[idx%colors.length]+' ' : '';
}

// ── 디테일 아이템명 생성 (컬러 + 핏 + 소재 + 아이템) ──
function detailItem(baseItem, color, style, gender, priority){
  const c={
    achromatic:['블랙','화이트','그레이','차콜','오프화이트'],
    earth:['베이지','카키','브라운','크림','샌드'],
    cool:['네이비','블루','스카이블루','그린','인디고'],
    warm:['버건디','와인','코랄','테라코타','머스타드'],
    any:['']
  };
  const colors = c[color]||[''];
  // 아이템별로 다른 컬러 배분
  const hash = baseItem.length % colors.length;
  const col = colors[hash] ? colors[hash]+' ' : '';

  // 핏 수식어
  const fitMap={
    '니트':        style==='street'?'오버핏 ':style==='minimal'?'슬림핏 ':'크롭 ',
    '맨투맨':      style==='street'?'오버핏 ':style==='minimal'?'베이직 ':'루즈핏 ',
    '후드티':      style==='street'?'빅사이즈 ':'루즈핏 ',
    '셔츠':        style==='formal'?'레귤러핏 ':style==='street'?'오버핏 ':'루즈핏 ',
    '블라우스':    gender==='female'?'플로럴 ':'',
    '티셔츠':      style==='street'?'오버핏 ':'베이직 ',
    '긴팔 티셔츠': style==='minimal'?'슬림핏 ':'베이직 ',
    '슬랙스':      style==='formal'?'테이퍼드 ':style==='street'?'와이드 ':'슬림 ',
    '청바지':      style==='street'?'와이드 ':style==='minimal'?'슬림 ':'스트레이트 ',
    '면바지':      '와이드 ',
    '트레이닝 바지':'조거 ',
    '레깅스':      '하이웨이스트 ',
    '자켓':        style==='formal'?'테일러드 ':style==='street'?'오버핏 ':'크롭 ',
    '가디건':      '루즈핏 ',
    '트렌치코트':  '더블브레스티드 ',
    '코트':        style==='minimal'?'롱 ':'미디 ',
    '야상':        '오버핏 ',
    '패딩':        tempData_=>tempData_&&tempData_.min<5?'롱 ':'숏 ',
    '바람막이':    '집업 ',
  };

  // 아이템 키 찾기
  let fit = '';
  for(const key of Object.keys(fitMap)){
    if(baseItem.includes(key)){
      const val = fitMap[key];
      fit = typeof val === 'function' ? '' : val;
      break;
    }
  }

  // "기능성" 이미 붙어있는 경우 컬러만
  if(baseItem.includes('기능성')) return col+baseItem;

  // 운동화/부츠 같은 신발/액세서리는 컬러만
  const noFitItems=['운동화','로퍼','부츠','앵클부츠','샌들','슬리퍼','양말','머플러','선글라스','귀마개','핫팩'];
  if(noFitItems.some(n=>baseItem.includes(n))) return col+baseItem;

  return col+fit+baseItem;
}

// ── 코디 추천 로직 (1순위: 용도 → 2순위: 날씨 → 3순위: 스타일+컬러) ──
function getOutfits(answers, tempData){
  const a={};answers.forEach(x=>a[x.questionId]=x.value);
  const {상의,하의,아우터,기타}=tempData.items;
  const gender=a.gender||'unisex';
  const style=a.style||'minimal';
  const occasion=a.occasion||'casual';
  const color=a.color||'any';
  const priority=a.priority||'style';

  // 디테일 아이템 헬퍼 (색상+핏 자동 적용)
  const di=(item)=>detailItem(item, color, style, gender, priority);

  const colorTips={
    achromatic:'블랙·화이트·그레이 무채색 조합으로 세련되게!',
    earth:'베이지·카키·브라운 어스톤으로 자연스럽게!',
    cool:'네이비·블루·그린 쿨톤으로 시원하고 깔끔하게!',
    warm:'버건디·코랄·테라코타 웜톤으로 화사하게!',
    any:'오늘 기분에 맞는 컬러로 자유롭게!'
  };
  const colorTip=colorTips[color]||'';

  const outfits=[];

  // ══ 1순위: 용도(occasion) 최우선 ══
  if(occasion==='sport'){
    const sportTop = tempData.min>=20 ? di('기능성 반팔 티셔츠') : tempData.min>=12 ? di('기능성 긴팔 티셔츠') : di('기능성 티셔츠');
    const sportBottom = gender==='female' ? di('하이웨이스트 레깅스') : di('조거 트레이닝 바지');
    const sportOuter = tempData.min<17 ? (tempData.min<9 ? di('기능성 패딩') : di('집업 바람막이')) : null;
    outfits.push({
      name:'스포츠 퍼포먼스 룩',
      items:[sportTop, sportBottom, sportOuter, '쿠션감 있는 운동화'].filter(Boolean),

    });

  } else if(occasion==='date'){
    const dateTop = style==='trendy' ? di('크롭 니트') : style==='street' ? di('오버핏 맨투맨') : di('루즈핏 블라우스');

      name:'설레는 데이트 룩',
      items:[dateTop, dateBottom, dateOuter, 기타[0]||'스니커즈'].filter(Boolean),

    });
    outfits.push({
      name:'로맨틱 캐주얼 룩',
      items:[di('루즈핏 니트'), di('스트레이트 청바지'), tempData.min<17?di('루즈핏 가디건'):null, di('로퍼')].filter(Boolean),
      tip:'편안하면서도 사랑스럽게. 여유 있는 핏이 더 자연스럽고 매력적이에요.'
    });

  } else if(occasion==='home'){
    outfits.push({
      name:'포근한 홈웨어 룩',
      items:[di('기모 맨투맨'), di('조거 트레이닝 바지'), '두꺼운 양말', '슬리퍼'],
      tip:'집에서 편안하게! 부드럽고 포근한 기모 소재가 핵심이에요.'
    });
    outfits.push({
      name:'캐주얼 홈웨어 룩',
      items:[di('루즈핏 맨투맨'), di('와이드 면바지'), '슬리퍼'],
      tip:'가벼운 외출도 가능한 편안한 홈 스타일! 편의점 정도는 바로 나갈 수 있어요.'
    });

  } else {
    // casual
    const casualTop = style==='street' ? di('오버핏 맨투맨') : style==='minimal' ? di('슬림핏 긴팔 티셔츠') : di(상의[0]);
    const casualBottom = style==='formal' ? di('테이퍼드 슬랙스') : di('스트레이트 청바지');
    const casualOuter = 아우터.length ? di(아우터[0]) : null;
    outfits.push({
      name:'데일리 캐주얼 룩',
      items:[casualTop, casualBottom, casualOuter, 기타[0]||'스니커즈'].filter(Boolean),
      tip:'어디서나 무난하게! 기본에 충실한 실패 없는 데일리 스타일.'
    });
    outfits.push({
      name: style==='street'?'스트릿 무드 룩':style==='minimal'?'클린 미니멀 룩':style==='natural'?'내추럴 빈티지 룩':'트렌디 믹스 룩',
      items:[di(상의[1]||상의[0]), di(하의[1]||하의[0]), 아우터[1]?di(아우터[1]):null].filter(Boolean),
      tip:style==='street'?'힙하고 트렌디한 스트릿 무드! 오버핏으로 연출하면 더 좋아요.':style==='minimal'?'군더더기 없는 깔끔한 미니멀! 컬러 하나로 통일감을 줘요.':'편안하고 자연스러운 무드! 어스톤 컬러가 잘 어울려요.'
    });
  }

  // ══ 3순위: 날씨+priority 최적화 코디 ══
  const w1 = priority==='neat'||priority==='style'
    ? di(상의.find(i=>i.includes('셔츠')||i.includes('니트'))||상의[0])
    : di(상의.find(i=>i.includes('맨투맨')||i.includes('티셔츠'))||상의[0]);
  const w2 = priority==='neat' ? di(하의.find(i=>i.includes('슬랙스'))||하의[0]) : di(하의[0]);
  const w3 = 아우터.length ? di(아우터[0]) : null;
  outfits.push({
    name:`${tempData.label} 날씨 최적 코디`,
    items:[w1, w2, w3, 기타[0]||null].filter(Boolean),
    tip:`${tempData.desc} 오늘 기온에 딱 맞춘 코디! ${priority==='neat'?'단정하게!':priority==='comfort'?'편안하게!':priority==='unique'?'개성 있게!':'스타일리쉬하게!'} — ${colorTip}`
  });

  return outfits.slice(0,3).map((o,i)=>({...o,colorTip,gender,rank:i+1}));
}

function getColorCombo(color,style){
  var list=COLOR_COMBOS[color]||COLOR_COMBOS.any;
  var idx=style==='minimal'?0:style==='natural'?1:style==='formal'?2:style==='street'?3:0;
  return list[idx%list.length];
}

function isBright(hex){
  try{
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return (r*299+g*587+b*114)/1000>150;
  }catch(e){return true;}
}

function buildColorCard(color,style){
  var combo=getColorCombo(color,style);
  var th=COLOR_HEX[combo.top]||'#ccc';
  var bh=COLOR_HEX[combo.bottom]||'#ccc';
  var oh=COLOR_HEX[combo.outer]||'#ccc';

  var matchData=COLOR_MATCH[combo.top];
  var matches=matchData?matchData.best.slice(0,3):[];

  // 어울리는 하의 컬러 블록
  var matchBlocks='';
  for(var i=0;i<matches.length;i++){
    var mh=COLOR_HEX[matches[i]]||'#ccc';
    matchBlocks+='<div style="flex:1;text-align:center">'
      +'<div style="height:32px;border-radius:8px;background:'+mh+';border:1px solid rgba(0,0,0,.1);margin-bottom:4px"></div>'
      +'<div style="font-size:9px;color:var(--muted);font-weight:600">'+matches[i]+'</div>'
      +'</div>';
  }

  return '<div style="margin-top:16px;padding:16px;background:#fff;border-radius:16px;border:1.5px solid var(--border);box-shadow:0 2px 12px rgba(74,158,221,.08)">'
    +'<div style="font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px">오늘의 컬러 조합</div>'

    // 옷 실루엣 3개
    +'<div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:14px">'

    // 상의
    +'<div style="text-align:center">'
    +svgTop(th)
    +'<div style="font-size:9px;color:var(--muted);font-weight:600;margin-top:4px">상의</div>'
    +'<div style="font-size:10px;font-weight:700;color:var(--text)">'+combo.top+'</div>'
    +'</div>'

    // + 기호
    +'<div style="font-size:18px;color:var(--muted);margin-bottom:24px">+</div>'

    // 하의
    +'<div style="text-align:center">'
    +svgBottom(bh)
    +'<div style="font-size:9px;color:var(--muted);font-weight:600;margin-top:4px">하의</div>'
    +'<div style="font-size:10px;font-weight:700;color:var(--text)">'+combo.bottom+'</div>'
    +'</div>'

    // + 기호
    +'<div style="font-size:18px;color:var(--muted);margin-bottom:24px">+</div>'

    // 아우터
    +'<div style="text-align:center">'
    +svgOuter(oh)
    +'<div style="font-size:9px;color:var(--muted);font-weight:600;margin-top:4px">아우터</div>'
    +'<div style="font-size:10px;font-weight:700;color:var(--text)">'+combo.outer+'</div>'
    +'</div>'

    +'</div>'

    // 등급 배지
    +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;padding:8px 12px;background:var(--bg2);border-radius:10px">'
    +'<span style="font-size:14px">'+(combo.grade==='찰떡'?'💕':'👍')+'</span>'
    +'<span style="font-size:12px;font-weight:700;color:var(--blue)">'+combo.grade+' 조합!</span>'
    +'<span style="font-size:11px;color:var(--muted)">'+combo.top+' × '+combo.bottom+' × '+combo.outer+'</span>'
    +'</div>'

    // 어울리는 하의 추천
    +(matches.length
      ?'<div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.04em;margin-bottom:8px">'+combo.top+' 상의에 어울리는 하의 컬러</div>'
       +'<div style="display:flex;gap:8px">'+matchBlocks+'</div>'
      :'')
    +'</div>';
}

// ── 날씨 가져오기 (캐시 방지) ──
async function getWeather(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){resolve(null);return}
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const {latitude:lat,longitude:lon}=pos.coords;
        const apiKey='1611b673069eff5c2e8c98ce5ae05ddd';
        const ts=Date.now(); // 캐시 방지
        const url=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=kr&_t=${ts}`;
        const res=await fetch(url,{cache:'no-store'});
        const data=await res.json();
        if(data.cod!==200){resolve(null);return}
        const temp=Math.round(data.main.feels_like); // 체감온도 사용
        const actual=Math.round(data.main.temp);
        const code=data.weather[0].id;
        let icon='🌤️';
        if(code===800)icon='☀️';
        else if(code>=801&&code<=804)icon='⛅';
        else if(code>=700&&code<800)icon='🌫️';
        else if(code>=600&&code<700)icon='❄️';
        else if(code>=500&&code<600)icon='🌧️';
        else if(code>=300&&code<400)icon='🌦️';
        else if(code>=200&&code<300)icon='⛈️';
        const desc=data.weather[0].description;
        resolve({temp:actual,feelsLike:temp,icon,desc,tempData:getTempDB(actual)});
      }catch(e){console.error('날씨 오류:',e);resolve(null)}
    },()=>resolve(null),{timeout:10000,enableHighAccuracy:true,maximumAge:0});
  });
}

function getWeatherIcon(temp){
  if(temp>=28)return"☀️";
  if(temp>=23)return"🌤️";
  if(temp>=17)return"⛅";
  if(temp>=12)return"🌬️";
  if(temp>=5)return"🌨️";
  return"❄️";
}

      <div style="font-size:20px;font-weight:800;margin-bottom:10px;color:var(--text)">코디를 추천하는 중</div>
      <p style="color:var(--muted);font-size:13px;animation:pulse 2s ease-in-out infinite">기온과 스타일을 분석하고 있어요</p>
    </div>`;return}

  if(s.screen==="result"){
    const outfits=s.outfits, si=s.selectedOutfit, w=s.weather;
    const rankLabels=["1st","2nd","3rd"];
    const o=outfits[si];
    const gf = o.gender==='male' ? 'M' : o.gender==='female' ? 'F' : '';
    const gKw=o.gender==='male'?' 남성':o.gender==='female'?' 여성':'';

    let tabs='<div class="tab-row">';
    outfits.forEach((ot,i)=>{
      tabs+=`<div class="tab-btn ${i===si?'active':''}" onclick="selectOutfit(${i})">${rankLabels[i]}<br>${ot.name}</div>`;
    });
    tabs+='</div>';

    const itemsHTML=o.items.map(item=>`
      <div class="item-row">
        <span class="item-name">${item}</span>
        <div class="item-btns">
          <a class="shop-m" href="https://www.musinsa.com/snap/main/recommend?${gf?`gf=${gf}&`:''}keyword=${encodeURIComponent(item)}" target="_blank">무신사 코디</a>
          <a class="shop-c" href="https://www.coupang.com/np/search?q=${encodeURIComponent(item+gKw)}" target="_blank">쿠팡</a>
        </div>
      </div>`).join('');

    root.innerHTML=`<div class="anim-scaleUp">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <button onclick="restart()" style="padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:500">← 다시하기</button>
        <div style="font-size:14px;font-weight:800;color:var(--text)">오늘의 코디 추천</div>
        <a href="/" style="font-size:12px;color:var(--muted);text-decoration:none;font-weight:500">홈 →</a>
      </div>
      ${w?`<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-radius:14px;border:1.5px solid var(--border);margin-bottom:14px;box-shadow:0 2px 12px rgba(74,158,221,.08)">
        <span style="font-size:24px">${w.icon}</span>
        <div style="flex:1">
          <span style="font-size:18px;font-weight:900;color:var(--blue)">${w.temp}°C</span>
          <span style="font-size:12px;color:var(--muted);margin-left:8px">${w.tempData.label}</span>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${w.feelsLike!==w.temp?`체감 ${w.feelsLike}°C · `:''}${w.desc}</div>
        </div>
      </div>`:''}
      ${tabs}
      <div class="outfit-card anim-fadeUp">
        <div class="outfit-card-header">
          <span class="outfit-rank rank-${si+1}">${rankLabels[si]}</span>
          <span class="outfit-name">${o.name}</span>
        </div>
        <div style="padding:16px">
          <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:12px">${o.tip}</div>
          ${o.colorTip?`<div style="font-size:11px;color:var(--blue-dark);margin-bottom:12px;padding:8px 12px;background:var(--blue-light);border-radius:10px;border-left:3px solid var(--blue)">🎨 ${o.colorTip}</div>`:''}
          <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px">추천 아이템</div>
          ${itemsHTML}
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button onclick="restart()" style="flex:1;padding:13px;border-radius:14px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif">🔄 다시 테스트</button>
        <a href="/" style="flex:1;padding:13px;border-radius:14px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:600;text-decoration:none;text-align:center;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center">🏠 홈으로</a>
      </div>

      <div id="color-card-wrap"></div>

      <div id="color-card-wrap"></div>

      <div style="margin-top:16px;display:flex;justify-content:center">
        <iframe src="https://ads-partners.coupang.com/widgets.html?id=975826&template=carousel&trackingCode=AF6033415&subId=&width=300&height=250&tsource=" width="300" height="250" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>
      </div>
    </div>`;
    setTimeout(function(){
      var el=document.getElementById('color-card-wrap');
      if(!el)return;
      var ans={};
      s.answers.forEach(function(x){ans[x.questionId]=x.value;});
      el.innerHTML=buildColorCard(ans.color||'any',ans.style||'minimal');
    },50);
    setTimeout(function(){
      var el=document.getElementById('color-card-wrap');
      if(!el)return;
      var ans={};
      s.answers.forEach(function(x){ans[x.questionId]=x.value;});
      el.innerHTML=buildColorCard(ans.color||'any',ans.style||'minimal');
    },50);
    return}
}
// ── Actions ──
function startQuiz(){
  // 날씨 없으면 다시 시도
  if(!state.weather){
    getWeather().then(w=>setState({weather:w,screen:"quiz",currentQ:0,answers:[]}));
    setState({screen:"quiz",currentQ:0,answers:[]});
  } else {
    setState({screen:"quiz",currentQ:0,answers:[]});
  }
}

function goBackQuiz(){
  if(state.currentQ===0){setState({screen:"intro"});return;}
  const na=state.answers.slice(0,-1);
  setState({answers:na,currentQ:state.currentQ-1});
}

function selectOption(qIdx,optIdx){
  const q=QUESTIONS[qIdx],opt=q.options[optIdx];
  document.querySelectorAll(".option-btn")[optIdx].classList.add("selected");
  setTimeout(()=>{
    const na=[...state.answers,{questionId:q.id,value:opt.value}];
    if(qIdx<QUESTIONS.length-1){
      setState({answers:na,currentQ:qIdx+1});
    } else {
      setState({answers:na,screen:"loading"});
      setTimeout(()=>{
        const tempData=state.weather?state.weather.tempData:getTempDB(15);
        const outfits=getOutfits(na,tempData);
        setState({outfits,selectedOutfit:0,screen:"result"});
      },1200);
    }
  },350);
}

function selectOutfit(idx){setState({selectedOutfit:idx})}
function restart(){setState({screen:"intro",currentQ:0,answers:[],outfits:[],selectedOutfit:0})}

render();
</script>
</body>
