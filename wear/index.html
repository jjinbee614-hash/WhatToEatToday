<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>오늘 뭐 입지? — What2Today</title>
<meta name="description" content="기온과 상황에 맞는 오늘의 코디를 추천해드려요."/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070e;--card:#111120;--card2:#181828;
  --blue:#63b3ed;--blue2:#90cdf4;--blue-glow:rgba(99,179,237,.12);
  --text:#ede9e1;--muted:#5a5870;--border:rgba(255,255,255,.07);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(110px)}
.orb-1{width:550px;height:550px;background:radial-gradient(circle,rgba(10,20,50,.9),transparent 70%);top:-120px;right:-120px;animation:o1 14s ease-in-out infinite}
.orb-2{width:450px;height:450px;background:radial-gradient(circle,rgba(5,15,30,.9),transparent 70%);bottom:-100px;left:-100px;animation:o2 18s ease-in-out infinite}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(99,179,237,.04),transparent 70%);top:35%;left:20%;animation:o3 11s ease-in-out infinite}
.bg-line{position:fixed;top:0;left:50%;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(99,179,237,.05) 30%,rgba(99,179,237,.05) 70%,transparent);transform:translateX(-50%);pointer-events:none;z-index:0}

.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px 90px;position:relative;z-index:2}
.container{width:100%;max-width:400px}

/* Progress */
.progress-wrap{margin-bottom:32px}
.progress-track{height:1px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue2));transition:width .6s cubic-bezier(.4,0,.2,1)}
.progress-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

/* Buttons */
.btn-primary{width:100%;padding:16px 24px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#050a14;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:.04em;transition:all .3s ease}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(99,179,237,.25)}
.btn-ghost{width:100%;padding:14px 24px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;font-weight:400;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .25s ease}
.btn-ghost:hover{border-color:rgba(255,255,255,.15);color:var(--text)}

/* Options */
.options-list{display:flex;flex-direction:column;gap:8px}
.option-btn{width:100%;padding:15px 18px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:400;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .22s ease;text-align:left;display:flex;align-items:center;gap:12px;position:relative}
.opt-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .22s ease}
.option-btn:hover{border-color:rgba(99,179,237,.25);background:var(--card2);transform:translateX(3px)}
.option-btn:hover .opt-dot{background:var(--blue)}
.option-btn.selected{border-color:rgba(99,179,237,.4);background:rgba(99,179,237,.07)}
.option-btn.selected .opt-dot{background:var(--blue);box-shadow:0 0 8px rgba(99,179,237,.6)}

/* Weather Card */
.weather-card{border-radius:var(--radius);border:1px solid rgba(99,179,237,.2);background:var(--card);padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.weather-icon{font-size:40px;line-height:1}
.weather-temp{font-size:32px;font-weight:900;color:var(--blue);line-height:1}
.weather-desc{font-size:12px;color:var(--muted);margin-top:4px}
.weather-loading{text-align:center;padding:20px;color:var(--muted);font-size:13px}

/* Result Cards */
.outfit-cards{display:flex;flex-direction:column;gap:14px;margin:20px 0}
.outfit-card{border-radius:var(--radius);border:1px solid var(--border);background:var(--card);overflow:hidden;transition:all .3s ease;cursor:pointer}
.outfit-card:hover{border-color:rgba(99,179,237,.25);transform:translateY(-2px);box-shadow:0 16px 48px rgba(0,0,0,.4)}
.outfit-card-header{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.outfit-rank{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.rank-1{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#050a14}
.rank-2{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.rank-3{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
.outfit-name{font-size:16px;font-weight:800;flex:1}
.outfit-body{padding:16px}
.outfit-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.outfit-item{background:rgba(99,179,237,.1);border:1px solid rgba(99,179,237,.2);color:var(--blue);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.outfit-tip{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.outfit-shop{display:flex;gap:8px}
.shop-btn{flex:1;padding:10px;border-radius:10px;text-decoration:none;font-size:12px;font-weight:700;text-align:center;transition:all .2s;font-family:'Noto Sans KR',sans-serif}
.shop-musinsa{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);color:#fff}
.shop-musinsa:hover{background:rgba(255,255,255,.1)}
.shop-29cm{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff}
.shop-29cm:hover{background:rgba(255,255,255,.15)}

/* Tabs */
.tab-row{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{flex:1;padding:9px 4px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;text-align:center;line-height:1.6}
.tab-btn.active{border-color:rgba(99,179,237,.35);background:var(--blue-glow);color:var(--blue)}

/* Kakao AdFit */
.ad-wrap{position:fixed;bottom:0;left:0;right:0;z-index:999;display:flex;justify-content:center;align-items:center;background:rgba(7,7,14,.97);padding:8px 0;border-top:1px solid rgba(255,255,255,.07)}

@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-20px)}}
@keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,30px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleUp{from{opacity:0;transform:scale(.97) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.anim-scaleUp{animation:scaleUp .5s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.anim-fadeUp{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.anim-slideUp{animation:slideUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
</style>
</head>
<body>
<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="bg-line"></div>
<div class="app">
  <div class="container" id="root"></div>
</div>

<!-- 카카오 애드핏 -->
<div class="ad-wrap">
  <ins class="kakao_ad_area" style="display:none;" data-ad-unit="DAN-w1b5n8JUEWiLvW95" data-ad-width="320" data-ad-height="50"></ins>
  <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
</div>

<script>
// ── 기온별 옷차림 DB ──
const TEMP_DB=[
  {
    min:28,max:999,
    label:"28°C 이상",desc:"한여름! 최대한 가볍게",icon:"☀️",
    items:{상의:["민소매","반팔 티셔츠","크롭탑"],하의:["반바지","숏팬츠","미니스커트"],아우터:[],기타:["선글라스","샌들"]}
  },
  {
    min:23,max:27,
    label:"23~27°C",desc:"더운 날씨, 가볍게",icon:"🌤️",
    items:{상의:["반팔 티셔츠","얇은 셔츠","반팔 블라우스"],하의:["반바지","면바지","얇은 슬랙스"],아우터:[],기타:["스니커즈"]}
  },
  {
    min:20,max:22,
    label:"20~22°C",desc:"활동하기 좋은 날씨",icon:"🌥️",
    items:{상의:["긴팔 티셔츠","얇은 셔츠","긴팔 블라우스"],하의:["면바지","청바지","7부바지"],아우터:["얇은 가디건"],기타:["운동화"]}
  },
  {
    min:17,max:19,
    label:"17~19°C",desc:"밤엔 쌀쌀해요",icon:"⛅",
    items:{상의:["맨투맨","후드티","얇은 니트"],하의:["청바지","슬랙스","면바지"],아우터:["가디건","바람막이"],기타:["운동화","로퍼"]}
  },
  {
    min:12,max:16,
    label:"12~16°C",desc:"겉옷 필수!",icon:"🌬️",
    items:{상의:["니트","기모 맨투맨","두꺼운 셔츠"],하의:["청바지","두꺼운 슬랙스","스타킹"],아우터:["자켓","가디건","야상"],기타:["부츠","로퍼"]}
  },
  {
    min:9,max:11,
    label:"9~11°C",desc:"트렌치코트의 계절",icon:"🌧️",
    items:{상의:["니트","두꺼운 맨투맨","기모티"],하의:["청바지","두꺼운 슬랙스","스타킹"],아우터:["트렌치코트","자켓","야상"],기타:["부츠","앵클부츠"]}
  },
  {
    min:5,max:8,
    label:"5~8°C",desc:"두꺼운 외투 필수",icon:"🌨️",
    items:{상의:["히트텍","두꺼운 니트","기모 내의"],하의:["두꺼운 청바지","레깅스","기모바지"],아우터:["코트","가죽자켓","패딩"],기타:["부츠","머플러"]}
  },
  {
    min:-99,max:4,
    label:"4°C 이하",desc:"완전무장! 최대한 따뜻하게",icon:"❄️",
    items:{상의:["히트텍","두꺼운 니트","내복"],하의:["기모바지","두꺼운 레깅스","내복 하의"],아우터:["롱패딩","두꺼운 코트","목도리+장갑"],기타:["방한부츠","귀마개","핫팩"]}
  }
];

function getTempDB(temp){
  return TEMP_DB.find(t=>temp>=t.min&&temp<=t.max)||TEMP_DB[TEMP_DB.length-1];
}

// ── 질문 ──
const QUESTIONS=[
  {id:"gender",emoji:"👤",question:"어떤 스타일을 주로 입으시나요?",options:[
    {label:"👔 남성 스타일",value:"male"},
    {label:"👗 여성 스타일",value:"female"},
    {label:"🧢 젠더리스 / 유니섹스",value:"unisex"}]},
  {id:"occasion",emoji:"📍",question:"오늘 어디 가시나요?",options:[
    {label:"💼 출근 / 비즈니스",value:"work"},
    {label:"💑 데이트",value:"date"},
    {label:"🛍️ 캐주얼 외출",value:"casual"},
    {label:"🏋️ 운동 / 액티비티",value:"sport"},
    {label:"🏠 집에서 편하게",value:"home"}]},
  {id:"style",emoji:"✨",question:"선호하는 스타일은?",options:[
    {label:"🖤 미니멀 / 베이직",value:"minimal"},
    {label:"😎 스트릿 / 캐주얼",value:"street"},
    {label:"💎 포멀 / 클래식",value:"formal"},
    {label:"🌿 내추럴 / 빈티지",value:"natural"},
    {label:"🎨 트렌디 / 유니크",value:"trendy"}]},
  {id:"color",emoji:"🎨",question:"오늘 선호하는 색감은?",options:[
    {label:"⬛ 무채색 (블랙·화이트·그레이)",value:"achromatic"},
    {label:"🤎 어스톤 (베이지·브라운·카키)",value:"earth"},
    {label:"🔵 쿨톤 (네이비·블루·그린)",value:"cool"},
    {label:"🌸 웜톤 (레드·핑크·오렌지)",value:"warm"},
    {label:"🎲 상관없어, 추천해줘",value:"any"}]},
  {id:"priority",emoji:"⚡",question:"오늘 가장 중요한 건?",options:[
    {label:"😎 스타일리쉬하게 보이고 싶어",value:"style"},
    {label:"😌 편안하고 활동하기 쉽게",value:"comfort"},
    {label:"🌡️ 날씨에 맞게 따뜻/시원하게",value:"weather"},
    {label:"⚡ 빠르게 입고 나가야 해",value:"quick"}]}
];

// ── 성별 쇼핑 URL 생성 ──
function shopUrl(site, keyword, gender){
  const genderKw = gender==='male'?' 남성' : gender==='female'?' 여성' : '';
  const q = encodeURIComponent(keyword + genderKw);
  if(site==='musinsa'){
    const cat = gender==='male'?'002':'001'; // 무신사 남/여 카테고리
    return `https://www.musinsa.com/search/goods?q=${q}&gender=${gender==='male'?'male':'female'}`;
  }
  return `https://www.29cm.co.kr/search?keyword=${q}`;
}

// ── 아이템별 쇼핑 버튼 생성 ──
function renderItemShop(item, gender){
  const q=encodeURIComponent(item+(gender==='male'?' 남성':gender==='female'?' 여성':''));
  const mUrl=`https://www.musinsa.com/search/goods?q=${q}`;
  const cUrl=`https://www.29cm.co.kr/search?keyword=${q}`;
  return `<div style="display:flex;gap:4px;margin-top:4px">
    <a href="${mUrl}" target="_blank" style="flex:1;padding:5px 0;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;text-decoration:none;font-size:10px;font-weight:700;text-align:center;font-family:'Noto Sans KR',sans-serif">무신사</a>
    <a href="${cUrl}" target="_blank" style="flex:1;padding:5px 0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;text-decoration:none;font-size:10px;font-weight:700;text-align:center;font-family:'Noto Sans KR',sans-serif">29CM</a>
  </div>`;
}

// ── 코디 추천 로직 ──
function getOutfits(answers, tempData){
  const a={};answers.forEach(x=>a[x.questionId]=x.value);
  const {상의,하의,아우터,기타}=tempData.items;
  const gender=a.gender||'unisex';
  const style=a.style||'minimal';
  const occasion=a.occasion||'casual';
  const color=a.color||'any';

  // 스타일 우선순위로 상의/하의 선택
  function pickTop(){
    if(style==='formal'||occasion==='work')
      return 상의.find(i=>i.includes('셔츠')||i.includes('니트')||i.includes('블라우스'))||상의[0];
    if(style==='street')
      return 상의.find(i=>i.includes('맨투맨')||i.includes('후드')||i.includes('반팔'))||상의[0];
    if(style==='natural')
      return 상의.find(i=>i.includes('셔츠')||i.includes('긴팔'))||상의[0];
    return 상의[0];
  }
  function pickBottom(prefer){
    if(prefer==='formal') return 하의.find(i=>i.includes('슬랙스'))||하의[0];
    if(prefer==='casual') return 하의.find(i=>i.includes('청바지')||i.includes('면바지'))||하의[0];
    return 하의[0];
  }
  function pickOuter(prefer){
    if(!아우터.length) return null;
    if(prefer==='formal') return 아우터.find(i=>i.includes('코트')||i.includes('트렌치'))||아우터[0];
    if(prefer==='casual') return 아우터.find(i=>i.includes('가디건')||i.includes('자켓'))||아우터[0];
    return 아우터[0];
  }

  const colorTips={
    achromatic:'블랙·화이트·그레이 조합으로 미니멀하게!',
    earth:'베이지·카키·브라운 어스톤으로 자연스럽게!',
    cool:'네이비·블루·그린 쿨톤으로 시원하게!',
    warm:'레드·핑크·오렌지 웜톤으로 화사하게!',
    any:'오늘 기분에 맞는 컬러로 자유롭게!'
  };
  const colorTip=colorTips[color]||'';

  const outfits=[];

  // 1순위: 상황+스타일 최우선 코디
  if(occasion==='work'){
    outfits.push({name:'오피스 룩',
      items:[pickTop(),pickBottom('formal'),pickOuter('formal')].filter(Boolean).concat(기타.slice(0,1)),
      tip:'단정하고 깔끔한 오피스 무드. 컬러는 무채색이나 어스톤 위주로!'});
  } else if(occasion==='date'){
    outfits.push({name:'데이트 룩',
      items:[pickTop(),pickBottom('casual'),아우터[0]||null].filter(Boolean).concat(기타.slice(0,1)),
      tip:'세련되면서도 자연스러운 데이트 무드. 포인트 아이템 하나를 추가해보세요!'});
  } else if(occasion==='sport'){
    outfits.push({name:'스포츠 룩',
      items:['기능성 티셔츠','트레이닝 바지'].concat(기타.slice(0,1)),
      tip:'활동성 최우선! 땀 흡수 잘 되는 소재를 선택하세요.'});
  } else if(occasion==='home'){
    outfits.push({name:'편안한 홈웨어',
      items:['기모 맨투맨','트레이닝 바지','두꺼운 양말'],
      tip:'집에서도 포근하고 예쁘게! 편안함이 포인트.'});
  } else {
    // casual
    outfits.push({name:'데일리 캐주얼',
      items:[pickTop(),pickBottom('casual'),pickOuter('casual')].filter(Boolean).concat(기타.slice(0,1)),
      tip:'어디서나 무난하게 어울리는 데일리 스타일!'});
  }

  // 2순위: 스타일 기반 코디
  if(style==='minimal'){
    outfits.push({name:'미니멀 베이직',
      items:[상의.find(i=>i.includes('긴팔')||i.includes('셔츠'))||상의[0], 하의.find(i=>i.includes('슬랙스')||i.includes('면바지'))||하의[0], 아우터[0]||null].filter(Boolean),
      tip:'군더더기 없는 깔끔한 미니멀 스타일. 컬러는 하나로 통일!'});
  } else if(style==='street'){
    outfits.push({name:'스트릿 캐주얼',
      items:[상의.find(i=>i.includes('맨투맨')||i.includes('후드'))||상의[0], 하의.find(i=>i.includes('청바지'))||하의[0], 아우터.find(i=>i.includes('자켓')||i.includes('야상'))||아우터[0]||null].filter(Boolean),
      tip:'트렌디하고 힙한 스트릿 무드. 오버핏으로 연출하면 더 좋아요!'});
  } else if(style==='formal'){
    outfits.push({name:'클래식 포멀',
      items:[상의.find(i=>i.includes('셔츠')||i.includes('블라우스'))||상의[0], 하의.find(i=>i.includes('슬랙스'))||하의[0], 아우터.find(i=>i.includes('코트')||i.includes('자켓'))||아우터[0]||null].filter(Boolean),
      tip:'단정하고 격식 있는 클래식 포멀. 깔끔한 컬러 매칭이 핵심!'});
  } else if(style==='natural'){
    outfits.push({name:'내추럴 빈티지',
      items:[상의.find(i=>i.includes('셔츠'))||상의[0], 하의[0], 아우터.find(i=>i.includes('가디건'))||아우터[0]||null].filter(Boolean),
      tip:'편안하고 자연스러운 내추럴 무드. 어스톤 컬러가 잘 어울려요!'});
  } else {
    outfits.push({name:'트렌디 믹스',
      items:[상의[1]||상의[0], 하의[1]||하의[0], 아우터[1]||아우터[0]||null].filter(Boolean),
      tip:'트렌드를 살린 유니크한 믹스 스타일. 나만의 감각을 표현해보세요!'});
  }

  // 3순위: 기온 최적화 코디
  outfits.push({name:'날씨 최적 코디',
    items:[...상의.slice(0,1),...하의.slice(0,1),...아우터.slice(0,1),...기타.slice(0,1)].filter(Boolean),
    tip:`${tempData.label} 날씨에 맞춘 최적의 코디! ${tempData.desc}`});

  return outfits.slice(0,3).map((o,i)=>({...o,colorTip,gender,rank:i+1}));
}

// ── State ──
let state={
  screen:"intro",
  currentQ:0,
  answers:[],

  selectedOutfit:0
};
function setState(u){Object.assign(state,u);render()}

// ── 날씨 가져오기 (캐시 방지) ──
async function getWeather(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){resolve(null);return}
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const {latitude:lat,longitude:lon}=pos.coords;
        const apiKey='1611b673069eff5c2e8c98ce5ae05ddd';
        const ts=Date.now(); // 캐시 방지
        const url=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=kr&_t=${ts}`;
        const res=await fetch(url,{cache:'no-store'});
        const data=await res.json();
        if(data.cod!==200){resolve(null);return}
        const temp=Math.round(data.main.feels_like); // 체감온도 사용
        const actual=Math.round(data.main.temp);
        const code=data.weather[0].id;
        let icon='🌤️';
        if(code===800)icon='☀️';
        else if(code>=801&&code<=804)icon='⛅';
        else if(code>=700&&code<800)icon='🌫️';
        else if(code>=600&&code<700)icon='❄️';
        else if(code>=500&&code<600)icon='🌧️';
        else if(code>=300&&code<400)icon='🌦️';
        else if(code>=200&&code<300)icon='⛈️';
        const desc=data.weather[0].description;
        resolve({temp:actual,feelsLike:temp,icon,desc,tempData:getTempDB(actual)});
      }catch(e){console.error('날씨 오류:',e);resolve(null)}
    },()=>resolve(null),{timeout:10000,enableHighAccuracy:true,maximumAge:0});
  });
}

function getWeatherIcon(temp){
  if(temp>=28)return"☀️";
  if(temp>=23)return"🌤️";
  if(temp>=17)return"⛅";
  if(temp>=12)return"🌬️";
  if(temp>=5)return"🌨️";
  return"❄️";
}

// ── Actions ──
function startQuiz(){
  // 날씨 없으면 다시 시도
  if(!state.weather){
    getWeather().then(w=>setState({weather:w,screen:"quiz",currentQ:0,answers:[]}));
    setState({screen:"quiz",currentQ:0,answers:[]});
  } else {
    setState({screen:"quiz",currentQ:0,answers:[]});
  }
}

function goBackQuiz(){
  if(state.currentQ===0){setState({screen:"intro"});return;}
  const na=state.answers.slice(0,-1);
  setState({answers:na,currentQ:state.currentQ-1});
}

function selectOption(qIdx,optIdx){
  const q=QUESTIONS[qIdx],opt=q.options[optIdx];
  document.querySelectorAll(".option-btn")[optIdx].classList.add("selected");
  setTimeout(()=>{
    const na=[...state.answers,{questionId:q.id,value:opt.value}];
    if(qIdx<QUESTIONS.length-1){
      setState({answers:na,currentQ:qIdx+1});
    } else {
      setState({answers:na,screen:"loading"});
      setTimeout(()=>{
        const tempData=state.weather?state.weather.tempData:getTempDB(15);
        const outfits=getOutfits(na,tempData);
        setState({outfits,selectedOutfit:0,screen:"result"});
      },1200);
    }
  },350);
}

function selectOutfit(idx){setState({selectedOutfit:idx})}
function restart(){setState({screen:"intro",currentQ:0,answers:[],outfits:[],selectedOutfit:0})}

render();
</script>
