<title>오늘 뭐 입지? — What2Today</title>
<meta name="description" content="기온과 상황에 맞는 오늘의 코디를 추천해드려요."/>

<style>
:root{
  --bg:#f0f6ff;
  --bg2:#e8f2ff;
  --card:#ffffff;
  --card2:#f5f9ff;
  --blue:#4a9edd;
  --blue2:#6db8f0;
  --blue-dark:#2d7fc0;
  --blue-light:#ddeeff;
  --text:#1a2a3a;
  --muted:#7a9ab5;
  --border:#d0e4f5;
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Background */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px)}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(173,216,255,.6),transparent 70%);top:-100px;right:-100px;animation:o1 14s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(200,230,255,.5),transparent 70%);bottom:-80px;left:-80px;animation:o2 18s ease-in-out infinite}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,.8),transparent 70%);top:40%;left:25%;animation:o3 11s ease-in-out infinite}

.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px 100px;position:relative;z-index:2}
.container{width:100%;max-width:400px}

/* Progress */
.progress-wrap{margin-bottom:28px}
.progress-track{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue2));transition:width .6s cubic-bezier(.4,0,.2,1);border-radius:3px}
.progress-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* Buttons */
.btn-primary{width:100%;padding:16px 24px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:.04em;transition:all .3s ease;box-shadow:0 4px 20px rgba(74,158,221,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(74,158,221,.4)}
.btn-ghost{width:100%;padding:14px 24px;border-radius:14px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .25s ease}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}

/* Options */
.options-list{display:flex;flex-direction:column;gap:8px}
.option-btn{width:100%;padding:15px 18px;border-radius:14px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .22s ease;text-align:left;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(74,158,221,.06)}
.opt-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:all .22s ease}
.option-btn:hover{border-color:var(--blue);background:var(--blue-light);transform:translateX(3px)}
.option-btn:hover .opt-dot{background:var(--blue)}
.option-btn.selected{border-color:var(--blue);background:var(--blue-light)}
.option-btn.selected .opt-dot{background:var(--blue);box-shadow:0 0 0 3px rgba(74,158,221,.2)}

/* Outfit Card */
.outfit-card{border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;overflow:hidden;box-shadow:0 4px 24px rgba(74,158,221,.08)}
.outfit-card-header{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.outfit-rank{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.rank-1{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff}
.rank-2{background:rgba(74,158,221,.12);color:var(--blue)}
.rank-3{background:var(--border);color:var(--muted)}
.outfit-name{font-size:16px;font-weight:800;flex:1;color:var(--text)}

/* Tabs */
.tab-row{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{flex:1;padding:9px 4px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;text-align:center;line-height:1.6}
.tab-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}

/* Item row */
.item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);margin-bottom:8px}
.item-name{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-btns{display:flex;gap:5px;flex-shrink:0}
.shop-m{padding:6px 10px;border-radius:8px;background:var(--blue);color:#fff;text-decoration:none;font-size:10px;font-weight:700;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:background .2s}
.shop-m:hover{background:var(--blue-dark)}
.shop-c{padding:6px 10px;border-radius:8px;background:#fff;border:1.5px solid #e5393e;color:#e5393e;text-decoration:none;font-size:10px;font-weight:700;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .2s}
.shop-c:hover{background:#fff5f5}

/* Ad */
.ad-wrap{position:fixed;bottom:0;left:0;right:0;z-index:999;display:flex;justify-content:center;align-items:center;background:rgba(240,246,255,.97);padding:8px 0;border-top:1px solid var(--border)}

@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-20px)}}
@keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,30px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleUp{from{opacity:0;transform:scale(.97) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.anim-scaleUp{animation:scaleUp .5s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.anim-fadeUp{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.anim-slideUp{animation:slideUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}

      {top:'레드',     bottom:'베이지',  outer:'블랙',     score:'찰떡'},
    ]
  },
  any:{
    combos:[
      {top:'화이트',   bottom:'블랙',    outer:'그레이',   score:'찰떡'},
      {top:'베이지',   bottom:'네이비',  outer:'카멜',     score:'찰떡'},
      {top:'아이보리', bottom:'카키',    outer:'브라운',   score:'찰떡'},
      {top:'크림',     bottom:'블랙',    outer:'베이지',   score:'찰떡'},
    ]
  }
};

function getCombo(color, style){
  const combos=(COLOR_COMBOS[color]||COLOR_COMBOS.any).combos;
  const idx=style==='minimal'?0:style==='natural'?1:style==='formal'?2:style==='street'?3:0;
  return combos[idx%combos.length];
}

// ── 디테일 아이템명 생성 (지정색 + 핏 + 아이템) ──
function detailItem(baseItem, col, style, gender){
  // 핏 수식어 (아이템별)
  const fitMap={
    '니트':         style==='street'?'오버핏':style==='minimal'?'슬림핏':style==='natural'?'루즈핏':'크롭',
    '맨투맨':       style==='street'?'오버핏':style==='minimal'?'베이직':'루즈핏',
    '후드티':       style==='street'?'빅사이즈':'루즈핏',
    '셔츠':         style==='formal'?'레귤러핏':style==='street'?'오버핏':'루즈핏',
    '블라우스':     gender==='female'?'플로럴':'',
    '티셔츠':       style==='street'?'오버핏':'베이직',
    '긴팔 티셔츠':  style==='minimal'?'슬림핏':'베이직',
    '반팔 티셔츠':  style==='street'?'오버핏':'베이직',
    '슬랙스':       style==='formal'?'테이퍼드':style==='street'?'와이드':'슬림',
    '청바지':       style==='street'?'와이드':style==='minimal'?'슬림':'스트레이트',
    '면바지':       '와이드',
    '트레이닝 바지':'조거',
    '레깅스':       '하이웨이스트',
    '자켓':         style==='formal'?'테일러드':style==='street'?'오버핏':'크롭',
    '가디건':       '루즈핏',
    '트렌치코트':   '더블브레스티드',
    '코트':         style==='minimal'?'롱':'미디',
    '야상':         '오버핏',
    '패딩':         '숏',
    '롱패딩':       '롱',
    '바람막이':     '집업',
    '기모 맨투맨':  '루즈핏',
    '기모티':       '베이직',
  };

  // 신발/액세서리 → 컬러+아이템만
  const noFit=['운동화','로퍼','부츠','앵클부츠','샌들','슬리퍼','양말','머플러','선글라스','귀마개','핫팩','스니커즈'];
  if(noFit.some(n=>baseItem.includes(n))) return col ? `${col} ${baseItem}` : baseItem;

  // 기능성 아이템 → 컬러만
  if(baseItem.includes('기능성')||baseItem.includes('히트텍')||baseItem.includes('내복')) return col ? `${col} ${baseItem}` : baseItem;

  // 핏 찾기
  let fit='';
  for(const key of Object.keys(fitMap)){
    if(baseItem.includes(key)){ fit=fitMap[key]; break; }
  }

  return [col, fit, baseItem].filter(Boolean).join(' ');
}

      name:'오피스 프로페셔널 룩',
      items:[workTop, di('테이퍼드 슬랙스'), tempData.min<17?di('트렌치코트'):null, di('로퍼')].filter(Boolean),
      tip:'신뢰감 있는 오피스 무드! 깔끔한 핏과 단정한 컬러로 전문적인 인상을 줘요.'
    });
    outfits.push({
      name:'스마트 캐주얼 룩',
      items:[di('니트'), di('슬림 슬랙스'), tempData.min<17?di('테일러드 자켓'):null, di('로퍼')].filter(Boolean),
      tip:'포멀하지 않아도 단정하게! 니트+슬랙스 조합은 실패 없는 오피스룩.'
    });

  } else if(occasion==='date'){
    const dateTop = style==='trendy' ? di('크롭 니트') : style==='street' ? di('오버핏 맨투맨') : di('루즈핏 블라우스');
    const dateBottom = gender==='female' ? di('미니스커트') : di('슬림 슬랙스');
    const dateOuter = tempData.min<20 ? di(아우터[0]||'가디건') : null;
    outfits.push({
      name:'설레는 데이트 룩',
      items:[dateTop, dateBottom, dateOuter, 기타[0]||'스니커즈'].filter(Boolean),
      tip:'설레는 데이트 무드! 포인트 아이템 하나로 기억에 남는 스타일을 만들어요.'
    });
    outfits.push({
      name:'로맨틱 캐주얼 룩',
      items:[di('루즈핏 니트'), di('스트레이트 청바지'), tempData.min<17?di('루즈핏 가디건'):null, di('로퍼')].filter(Boolean),
      tip:'편안하면서도 사랑스럽게. 여유 있는 핏이 더 자연스럽고 매력적이에요.'
    });

  } else if(occasion==='home'){
    outfits.push({
      name:'포근한 홈웨어 룩',
      items:[di('기모 맨투맨'), di('조거 트레이닝 바지'), '두꺼운 양말', '슬리퍼'],
      tip:'집에서 편안하게! 부드럽고 포근한 기모 소재가 핵심이에요.'
    });
    outfits.push({
      name:'캐주얼 홈웨어 룩',
      items:[di('루즈핏 맨투맨'), di('와이드 면바지'), '슬리퍼'],
      tip:'가벼운 외출도 가능한 편안한 홈 스타일! 편의점 정도는 바로 나갈 수 있어요.'
    });

  } else {
    // casual
    const casualTop = style==='street' ? di('오버핏 맨투맨') : style==='minimal' ? di('슬림핏 긴팔 티셔츠') : di(상의[0]);
    const casualBottom = style==='formal' ? di('테이퍼드 슬랙스') : di('스트레이트 청바지');
    const casualOuter = 아우터.length ? di(아우터[0]) : null;
    outfits.push({
      name:'데일리 캐주얼 룩',
      items:[casualTop, casualBottom, casualOuter, 기타[0]||'스니커즈'].filter(Boolean),
      tip:'어디서나 무난하게! 기본에 충실한 실패 없는 데일리 스타일.'
    });
    outfits.push({
      name: style==='street'?'스트릿 무드 룩':style==='minimal'?'클린 미니멀 룩':style==='natural'?'내추럴 빈티지 룩':'트렌디 믹스 룩',
      items:[di(상의[1]||상의[0]), di(하의[1]||하의[0]), 아우터[1]?di(아우터[1]):null].filter(Boolean),
      tip:style==='street'?'힙하고 트렌디한 스트릿 무드! 오버핏으로 연출하면 더 좋아요.':style==='minimal'?'군더더기 없는 깔끔한 미니멀! 컬러 하나로 통일감을 줘요.':'편안하고 자연스러운 무드! 어스톤 컬러가 잘 어울려요.'
    });
  }

  // ══ 3순위: 날씨+priority 최적화 코디 ══
  const w1 = priority==='neat'||priority==='style'
    ? di(상의.find(i=>i.includes('셔츠')||i.includes('니트'))||상의[0])
    : di(상의.find(i=>i.includes('맨투맨')||i.includes('티셔츠'))||상의[0]);
  const w2 = priority==='neat' ? di(하의.find(i=>i.includes('슬랙스'))||하의[0]) : di(하의[0]);
  const w3 = 아우터.length ? di(아우터[0]) : null;
  outfits.push({
    name:`${tempData.label} 날씨 최적 코디`,
    items:[w1, w2, w3, 기타[0]||null].filter(Boolean),
    tip:`${tempData.desc} 오늘 기온에 딱 맞춘 코디! ${priority==='neat'?'단정하게!':priority==='comfort'?'편안하게!':priority==='unique'?'개성 있게!':'스타일리쉬하게!'} — ${colorTip}`
  });

  return outfits.slice(0,3).map((o,i)=>({...o,colorTip,gender,rank:i+1}));
}

// ── State ──
let state={
  screen:"intro",
  currentQ:0,
  answers:[],
  weather:null,
  outfits:[],
  selectedOutfit:0
};
function setState(u){Object.assign(state,u);render()}

// ── 날씨 가져오기 (캐시 방지) ──
async function getWeather(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){resolve(null);return}
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const {latitude:lat,longitude:lon}=pos.coords;
        const apiKey='1611b673069eff5c2e8c98ce5ae05ddd';
        const ts=Date.now(); // 캐시 방지
        const url=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=kr&_t=${ts}`;
        const res=await fetch(url,{cache:'no-store'});
        const data=await res.json();
        if(data.cod!==200){resolve(null);return}
        const temp=Math.round(data.main.feels_like); // 체감온도 사용
        const actual=Math.round(data.main.temp);
        const code=data.weather[0].id;
        let icon='🌤️';
        if(code===800)icon='☀️';
        else if(code>=801&&code<=804)icon='⛅';
        else if(code>=700&&code<800)icon='🌫️';
        else if(code>=600&&code<700)icon='❄️';
        else if(code>=500&&code<600)icon='🌧️';
        else if(code>=300&&code<400)icon='🌦️';
        else if(code>=200&&code<300)icon='⛈️';
        const desc=data.weather[0].description;
        resolve({temp:actual,feelsLike:temp,icon,desc,tempData:getTempDB(actual)});
      }catch(e){console.error('날씨 오류:',e);resolve(null)}
    },()=>resolve(null),{timeout:10000,enableHighAccuracy:true,maximumAge:0});
  });
}

function getWeatherIcon(temp){
  if(temp>=28)return"☀️";
  if(temp>=23)return"🌤️";
  if(temp>=17)return"⛅";
  if(temp>=12)return"🌬️";
  if(temp>=5)return"🌨️";
  return"❄️";
}

      <div class="anim-slideUp" style="margin-bottom:24px">
        <div style="font-size:11px;letter-spacing:.12em;color:var(--blue);text-transform:uppercase;margin-bottom:14px;font-weight:600">Question ${s.currentQ+1}</div>

    return}

  if(s.screen==="loading"){
    root.innerHTML=`<div class="anim-fadeUp" style="text-align:center;padding:40px 0">
      <div style="width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 24px"></div>
      <div style="font-size:20px;font-weight:800;margin-bottom:10px;color:var(--text)">코디를 추천하는 중</div>
      <p style="color:var(--muted);font-size:13px;animation:pulse 2s ease-in-out infinite">기온과 스타일을 분석하고 있어요</p>
    </div>`;return}

  if(s.screen==="result"){
    const outfits=s.outfits, si=s.selectedOutfit, w=s.weather;

    const gf = o.gender==='male' ? 'M' : o.gender==='female' ? 'F' : '';
    const gKw=o.gender==='male'?' 남성':o.gender==='female'?' 여성':'';
    // 컬러 조합 계산

          <span style="font-size:18px;font-weight:900;color:var(--blue)">${w.temp}°C</span>

// ── Actions ──
function startQuiz(){
  // 날씨 없으면 다시 시도
  if(!state.weather){
    getWeather().then(w=>setState({weather:w,screen:"quiz",currentQ:0,answers:[]}));
    setState({screen:"quiz",currentQ:0,answers:[]});
  } else {
    setState({screen:"quiz",currentQ:0,answers:[]});
  }
}

function goBackQuiz(){
  if(state.currentQ===0){setState({screen:"intro"});return;}
  const na=state.answers.slice(0,-1);
  setState({answers:na,currentQ:state.currentQ-1});
}

function selectOption(qIdx,optIdx){
  const q=QUESTIONS[qIdx],opt=q.options[optIdx];
  document.querySelectorAll(".option-btn")[optIdx].classList.add("selected");
  setTimeout(()=>{
    const na=[...state.answers,{questionId:q.id,value:opt.value}];
    if(qIdx<QUESTIONS.length-1){
      setState({answers:na,currentQ:qIdx+1});
    } else {
      setState({answers:na,screen:"loading"});
      setTimeout(()=>{
        const tempData=state.weather?state.weather.tempData:getTempDB(15);
        const outfits=getOutfits(na,tempData);
        setState({outfits,selectedOutfit:0,screen:"result"});
      },1200);
    }
  },350);
}

function selectOutfit(idx){setState({selectedOutfit:idx})}
function restart(){setState({screen:"intro",currentQ:0,answers:[],outfits:[],selectedOutfit:0})}

render();
</script>
